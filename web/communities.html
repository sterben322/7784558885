<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Сообщества</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
<header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="/dashboard.html" class="font-bold text-lg">LASTOP</a>
        <nav class="flex items-center gap-4 text-sm">
            <a href="/dashboard.html" class="text-gray-600 hover:text-black">Дашборд</a>
            <a href="/jobs.html" class="text-gray-600 hover:text-black">Вакансии</a>
            <a href="/forum.html" class="text-gray-600 hover:text-black">Форум</a>
            <a href="/chat.html" class="text-gray-600 hover:text-black">Чат</a>
            <a href="/profile.html" class="text-gray-600 hover:text-black">Профиль</a>
        </nav>
    </div>
</header>

<div class="max-w-6xl mx-auto p-4 space-y-6">
    <div class="bg-white rounded-xl shadow-sm p-6 flex items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold mb-2">Сообщества</h1>
            <p class="text-gray-600">Выберите сообщество для общения, новостей и нетворкинга.</p>
        </div>
        <a href="/create-community.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 whitespace-nowrap"><i class="fas fa-plus mr-2"></i>Создать сообщество</a>
    </div>

    <div id="communitiesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>

<script>
const API_URL = '/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = '/login.html';

function communityCard(c){
  const color = c.color || 'blue';
  const icon = c.icon || 'fa-users';
  const description = c.description || 'Описание не указано';
  return `
    <div class="border rounded-xl p-6 hover:shadow-md transition bg-white">
      <div class="flex items-start justify-between gap-3">
        <div class="flex items-center space-x-4">
          <div class="w-14 h-14 bg-${color}-100 rounded-xl flex items-center justify-center"><i class="fas ${icon} text-${color}-600 text-xl"></i></div>
          <div>
            <h3 class="font-bold text-lg">${c.name}</h3>
            <p class="text-sm text-gray-500">${c.members_count || 0} участников</p>
          </div>
        </div>
        <a href="/community.html?id=${c.id}" class="px-4 py-2 rounded-lg ${c.joined ? 'bg-gray-100 text-gray-700' : 'bg-blue-600 text-white'} hover:opacity-90">${c.joined ? 'Открыть' : 'Вступить'}</a>
      </div>
      <p class="text-gray-600 mt-4">${description.substring(0, 120)}${description.length > 120 ? '...' : ''}</p>
    </div>`;
}

async function loadCommunities(){
  const container = document.getElementById('communitiesList');
  container.innerHTML = '<p class="text-gray-500">Загрузка...</p>';

  try {
    const response = await fetch(`${API_URL}/communities`, {headers:{Authorization:`Bearer ${token}`}});
    const data = await response.json();
    const communities = data.communities || [];

    if (!communities.length) {
      container.innerHTML = '<div class="bg-white rounded-xl p-6 text-gray-500">Пока нет сообществ.</div>';
      return;
    }

    container.innerHTML = communities.map(communityCard).join('');
  } catch (e) {
    container.innerHTML = '<div class="bg-white rounded-xl p-6 text-red-500">Не удалось загрузить сообщества</div>';
  }
}

loadCommunities();
</script>
</body>
</html>
