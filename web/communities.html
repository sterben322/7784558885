<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Сообщества</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-white text-[#273244]">
<div class="min-h-screen p-6 font-sans">
    <div class="mx-auto max-w-6xl overflow-hidden rounded-[30px] border border-white/70 bg-white shadow-[0_18px_60px_rgba(162,175,186,0.24)]">
        <header class="flex flex-wrap items-center justify-between gap-4 border-b border-[#e8ecef] bg-[linear-gradient(180deg,#fbfcfc_0%,#f7f9f9_100%)] px-6 py-5">
            <div>
                <a href="/dashboard.html" class="text-sm text-[#7f8b98] hover:text-[#2c394b]"><i class="fa-solid fa-arrow-left mr-2"></i>Назад в ленту</a>
                <h1 class="mt-2 text-[30px] font-semibold tracking-[-0.02em] text-[#2c394b]">Сообщества LASTOP</h1>
                <p class="text-[#7e8a97]">Каталог сообществ с удобной фильтрацией и сортировкой.</p>
            </div>
            <div class="flex gap-3">
                <a href="/create-community.html" class="rounded-2xl border border-[#dbe4e9] bg-white px-4 py-2.5 text-sm font-medium text-[#3f5163] hover:bg-[#f4f8fa]">
                    <i class="fa-solid fa-plus mr-2"></i>Создать сообщество
                </a>
                <a href="/dashboard.html#communities" class="rounded-2xl bg-[#4c8d78] px-4 py-2.5 text-sm font-semibold text-white hover:bg-[#3f7866]">
                    <i class="fa-solid fa-users mr-2"></i>Мои сообщества
                </a>
            </div>
        </header>

        <section class="border-b border-[#e8ecef] bg-[#fbfcfc] px-6 py-5">
            <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
                <select id="communityPrivacyFilter" class="rounded-2xl border border-[#e1e8ec] bg-white px-4 py-3 text-[15px] outline-none">
                    <option value="all">Все сообщества</option>
                    <option value="public">Только открытые</option>
                    <option value="private">Только приватные</option>
                </select>
                <select id="communitySort" class="rounded-2xl border border-[#e1e8ec] bg-white px-4 py-3 text-[15px] outline-none">
                    <option value="members">Сначала популярные</option>
                    <option value="posts">По числу публикаций</option>
                    <option value="name">По алфавиту</option>
                </select>
            </div>
        </section>

        <main class="bg-[linear-gradient(180deg,rgba(246,249,250,0.98)_0%,rgba(250,252,252,0.96)_100%)] px-6 py-6">
            <div id="communityList" class="grid grid-cols-1 gap-4 lg:grid-cols-2"></div>
            <div id="communityListEmpty" class="hidden rounded-2xl border border-dashed border-[#d4dde3] bg-white p-8 text-center text-[#7f8b98]">
                По вашему фильтру сообщества не найдены.
            </div>
        </main>
    </div>
</div>

<script>
const DEMO_COMMUNITIES = [
    {
        id: 'demo-community-1',
        name: 'Экспорт и логистика',
        owner_name: 'Команда LASTOP',
        description: 'Обсуждаем маршруты поставок, страхование грузов и новые логистические коридоры.',
        members_count: 1840,
        posts_count: 462,
        is_private: false,
        search_tags: ['логистика', 'экспорт', 'b2b']
    },
    {
        id: 'demo-community-2',
        name: 'AI в промышленности',
        owner_name: 'LASTOP Insights',
        description: 'Практические кейсы внедрения AI и автоматизации в производственных компаниях.',
        members_count: 980,
        posts_count: 217,
        is_private: false,
        search_tags: ['ai', 'промышленность', 'автоматизация']
    },
    {
        id: 'demo-community-3',
        name: 'Закрытый клуб поставщиков',
        owner_name: 'Совет партнеров',
        description: 'Приватное сообщество для верифицированных поставщиков и закупщиков.',
        members_count: 320,
        posts_count: 94,
        is_private: true,
        search_tags: ['закупки', 'поставщики', 'private']
    }
];

let communities = [...DEMO_COMMUNITIES];

function getCommunityTags(community) {
    const tags = community.search_tags || [];
    return Array.isArray(tags) ? tags : [];
}

function communityCard(community) {
    const tags = getCommunityTags(community);
    return `
        <article class="rounded-[22px] border border-[#e8ecee] bg-white px-5 py-5 shadow-[0_8px_18px_rgba(178,190,198,0.10)]">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h3 class="text-[22px] font-semibold leading-[1.25] text-[#2f3c4e]">${community.name}</h3>
                    <p class="mt-1 text-sm text-[#7f8b98]">Владелец: ${community.owner_name || 'Не указан'}</p>
                    <p class="mt-3 text-[15px] leading-6 text-[#697685]">${community.description || 'Описание отсутствует'}</p>
                </div>
                <span class="rounded-full ${community.is_private ? 'bg-[#fff2ee] text-[#b0553d]' : 'bg-[#eef7f2] text-[#5f8f7b]'} px-3 py-1 text-xs font-semibold">${community.is_private ? 'Приватное' : 'Открытое'}</span>
            </div>

            <div class="mt-4 flex flex-wrap gap-2.5">
                ${tags.length ? tags.map((tag) => `<span class="rounded-full bg-[#eef2f6] px-3 py-1.5 text-[12px] font-medium text-[#5f7081]">#${tag}</span>`).join('') : '<span class="text-xs text-[#97a3af]">Теги не указаны</span>'}
            </div>

            <dl class="mt-4 grid grid-cols-2 gap-3 text-sm">
                <div class="rounded-xl bg-[#f7f9fa] px-3 py-2"><dt class="text-[#8a97a5]">Участники</dt><dd class="text-lg font-semibold text-[#344153]">${community.members_count || 0}</dd></div>
                <div class="rounded-xl bg-[#f7f9fa] px-3 py-2"><dt class="text-[#8a97a5]">Публикации</dt><dd class="text-lg font-semibold text-[#344153]">${community.posts_count || 0}</dd></div>
            </dl>

            <div class="mt-5 flex flex-wrap gap-2">
                <a href="/community.html?id=${encodeURIComponent(community.id)}" class="rounded-xl border border-[#dce4e9] px-3 py-2 text-sm font-medium text-[#435467] hover:bg-[#f4f8fa]">Открыть сообщество</a>
                <button data-join-community="${community.id}" class="rounded-xl bg-[#eff7f3] px-3 py-2 text-sm font-semibold text-[#4c8d78] hover:bg-[#e3f1eb]">Присоединиться</button>
            </div>
        </article>
    `;
}

function filteredCommunities() {
    const privacy = document.getElementById('communityPrivacyFilter').value;
    const sort = document.getElementById('communitySort').value;

    const filtered = communities.filter((community) => {
        if (privacy === 'public') return !community.is_private;
        if (privacy === 'private') return community.is_private;
        return true;
    });

    filtered.sort((a, b) => {
        if (sort === 'posts') return (b.posts_count || 0) - (a.posts_count || 0);
        if (sort === 'name') return (a.name || '').localeCompare(b.name || '', 'ru');
        return (b.members_count || 0) - (a.members_count || 0);
    });

    return filtered;
}

function renderCommunities() {
    const list = document.getElementById('communityList');
    const empty = document.getElementById('communityListEmpty');
    const data = filteredCommunities();

    if (!data.length) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
    }

    empty.classList.add('hidden');
    list.innerHTML = data.map(communityCard).join('');
}

async function tryLoadFromAPI() {
    const token = localStorage.getItem('token');
    if (!token) return;

    try {
        const response = await fetch('/api/communities', {
            headers: { Authorization: `Bearer ${token}` }
        });
        if (!response.ok) return;

        const data = await response.json();
        if (Array.isArray(data.communities) && data.communities.length) {
            communities = [...DEMO_COMMUNITIES, ...data.communities];
        }
    } catch (error) {
        console.warn('Не удалось получить список сообществ из API:', error);
    }
}

function wireActions() {
    ['communityPrivacyFilter', 'communitySort'].forEach((id) => {
        document.getElementById(id).addEventListener('input', renderCommunities);
        document.getElementById(id).addEventListener('change', renderCommunities);
    });

    document.getElementById('communityList').addEventListener('click', async (event) => {
        const joinBtn = event.target.closest('[data-join-community]');
        if (!joinBtn) return;

        const communityId = joinBtn.dataset.joinCommunity;
        if (communityId.startsWith('demo-community-')) {
            joinBtn.textContent = 'Демо: вы участник';
            joinBtn.classList.remove('bg-[#eff7f3]', 'text-[#4c8d78]');
            joinBtn.classList.add('bg-[#4c8d78]', 'text-white');
            return;
        }

        const token = localStorage.getItem('token');
        if (!token) {
            alert('Требуется авторизация для вступления.');
            return;
        }

        const response = await fetch(`/api/communities/${communityId}/join`, {
            method: 'POST',
            headers: { Authorization: `Bearer ${token}` }
        });

        if (response.ok) {
            joinBtn.textContent = 'Вы участник';
            joinBtn.classList.remove('bg-[#eff7f3]', 'text-[#4c8d78]');
            joinBtn.classList.add('bg-[#4c8d78]', 'text-white');
        }
    });
}

(async function init() {
    wireActions();
    await tryLoadFromAPI();
    renderCommunities();
})();
</script>
</body>
</html>
