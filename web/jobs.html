<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Вакансии и резюме</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
<header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="/dashboard.html" class="font-bold text-lg">LASTOP</a>
        <nav class="flex items-center gap-4 text-sm">
            <a href="/dashboard.html" class="text-gray-600 hover:text-black">Дашборд</a>
            <a href="/communities.html" class="text-gray-600 hover:text-black">Сообщества</a>
            <a href="/forum.html" class="text-gray-600 hover:text-black">Форум</a>
            <a href="/chat.html" class="text-gray-600 hover:text-black">Чат</a>
            <a href="/profile.html" class="text-gray-600 hover:text-black">Профиль</a>
        </nav>
    </div>
</header>
<div class="max-w-6xl mx-auto p-4 space-y-6">
    <div class="bg-white rounded-xl shadow-sm p-6 flex items-center justify-between gap-4 flex-wrap">
        <div>
            <h1 class="text-2xl font-bold mb-2">Вакансии и резюме</h1>
            <p class="text-gray-600">Сначала отображается список вакансий. Создание резюме и вакансий вынесено в отдельные кнопки.</p>
        </div>
        <div class="flex items-center gap-3">
            <a href="/create-resume.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"><i class="fas fa-user-edit mr-2"></i>Создать резюме</a>
            <a href="/create-vacancy.html" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"><i class="fas fa-briefcase mr-2"></i>Создать вакансию</a>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-6">
      <h3 class="font-semibold mb-3 text-lg">Лента вакансий</h3>
      <div id="vacanciesList" class="space-y-3 text-sm"></div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-6">
      <h3 class="font-semibold mb-3 text-lg">Лента резюме</h3>
      <div id="resumesList" class="space-y-3 text-sm"></div>
    </div>
</div>

<script>
const API_URL = '/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = '/login.html';

async function loadData(){
  try {
    const [rVacancies, rResumes] = await Promise.all([
      fetch(`${API_URL}/vacancies`, {headers:{Authorization:`Bearer ${token}`}}),
      fetch(`${API_URL}/resumes`, {headers:{Authorization:`Bearer ${token}`}})
    ]);

    const vacancies = (await rVacancies.json()).vacancies || [];
    const resumes = (await rResumes.json()).resumes || [];

    document.getElementById('vacanciesList').innerHTML = vacancies.map(x => `
      <div class="border rounded p-3">
        <div class="font-semibold">${x.position} — ${x.salary}</div>
        <div class="text-gray-600">${x.publisher_name || 'Источник не указан'}</div>
        <div class="text-gray-500 mt-1">${x.expectations || ''}</div>
      </div>
    `).join('') || '<p class="text-gray-500">Пока нет вакансий</p>';

    document.getElementById('resumesList').innerHTML = resumes.map(x => `
      <div class="border rounded p-3">
        <div class="font-semibold">${x.title}</div>
        <div class="text-gray-600">${(x.skills || []).join(', ') || 'Навыки не указаны'}</div>
      </div>
    `).join('') || '<p class="text-gray-500">Пока нет резюме</p>';
  } catch (e) {
    document.getElementById('vacanciesList').innerHTML = '<p class="text-red-500">Ошибка загрузки данных</p>';
    document.getElementById('resumesList').innerHTML = '<p class="text-red-500">Ошибка загрузки данных</p>';
  }
}

loadData();
</script>
</body>
</html>
