<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Раздел в разработке</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-50 text-gray-800">
    <div class="mx-auto flex min-h-screen max-w-3xl items-center justify-center p-6">
        <div class="w-full rounded-2xl border border-gray-200 bg-white p-8 shadow-sm">
            <p class="text-sm font-medium uppercase tracking-wide text-blue-600">Скоро здесь будет новый раздел</p>
            <h1 id="stubTitle" class="mt-3 text-3xl font-bold">Раздел в разработке</h1>
            <p class="mt-4 text-gray-600">
                Для этого пункта уже создана заглушка. Позже сюда можно добавить отдельную страницу, логику и API.
            </p>
            <div class="mt-8 flex flex-wrap gap-3">
                <a href="javascript:history.back()" class="rounded-lg border border-gray-300 px-4 py-2 text-sm hover:bg-gray-100">Назад</a>
                <a href="/dashboard.html" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">На главную</a>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const section = params.get('section');
        if (section) {
            document.getElementById('stubTitle').textContent = decodeURIComponent(section);
            document.title = `LASTOP | ${decodeURIComponent(section)}`;
        }
    </script>
</body>
</html>
