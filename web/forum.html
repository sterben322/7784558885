<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASTOP GROUP — Форум</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:'Manrope',sans-serif;background:#f2f5f3;color:#1a2a22}
    .layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh;gap:12px;padding:12px}
    .nav,.main{background:#fff;border:1px solid #dde8e2;border-radius:18px}
    .nav{padding:10px}
    .nav-item{display:flex;align-items:center;gap:8px;text-decoration:none;color:#3a5245;padding:10px;border-radius:10px;font-size:14px}
    .nav-item:hover{background:#f0faf4;color:#1e8a4c}
    .nav-item.active{background:#1e8a4c;color:#fff;font-weight:700}
    .main{padding:18px}
    h1{margin:0 0 6px;font-size:24px}
    .sub{margin:0 0 16px;color:#5a8a6a}
    .section{border:1px solid #dde8e2;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer}
    .section:hover{background:#f8fffb}
    .section-title{font-weight:700;margin-bottom:4px}
    .meta{color:#5a8a6a;font-size:13px}
    .empty{padding:16px;border:1px dashed #c0deca;border-radius:12px;color:#5a8a6a}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="nav">
      <a class="nav-item" href="/dashboard.html">Лента</a>
      <a class="nav-item active" href="/forum.html">Форум</a>
      <a class="nav-item" href="/company.html">Компании</a>
      <a class="nav-item" href="/chat.html">Сообщения</a>
      <a class="nav-item" href="/profile.html">Профиль</a>
    </aside>
    <main class="main">
      <h1>Форум</h1>
      <p class="sub">Разделы и обсуждения сообщества</p>
      <div id="forumSections"><div class="empty">Загрузка разделов форума…</div></div>
    </main>
  </div>

  <script>
    const API='/api';
    const token=()=>localStorage.getItem('token');

    const esc=(v)=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

    async function loadSections(){
      const container=document.getElementById('forumSections');
      try{
        const r=await fetch(API+'/forum/sections',{headers:{Authorization:'Bearer '+token()}});
        if(!r.ok)throw new Error('forum sections request failed');
        const data=await r.json();
        const sections=data.sections||[];
        if(!sections.length){
          container.innerHTML='<div class="empty">Пока нет разделов форума.</div>';
          return;
        }
        container.innerHTML=sections.map(s=>`<article class="section" onclick="location.href='/community.html'">
            <div class="section-title">${esc(s.name||s.title||'Раздел')}</div>
            <div class="meta">${esc(s.description||'Открытое обсуждение')}</div>
          </article>`).join('');
      }catch(_){
        container.innerHTML=`
          <article class="section"><div class="section-title">Новости и анонсы</div><div class="meta">Официальные обновления платформы</div></article>
          <article class="section"><div class="section-title">Партнёрства и коллаборации</div><div class="meta">Поиск партнёров и совместных проектов</div></article>
          <article class="section"><div class="section-title">Вопросы по компаниям</div><div class="meta">Обсуждение карточек и профилей компаний</div></article>`;
      }
    }

    loadSections();
  </script>
</body>
</html>
