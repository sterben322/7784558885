<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LASTOP | Форум</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <header class="bg-white border-b">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/dashboard.html" class="font-bold text-lg">LASTOP</a>
            <nav class="flex items-center gap-4 text-sm flex-wrap justify-end">
                <a href="/dashboard.html" class="text-gray-600 hover:text-black">Главная</a>
                <a href="/dashboard.html#communities" class="text-gray-600 hover:text-black">Сообщества</a>
                <a href="/company.html" class="text-gray-600 hover:text-black">Компании</a>
                <a href="/jobs.html" class="text-gray-600 hover:text-black">Резюме и вакансии</a>
                <a href="/forum.html" class="text-gray-600 hover:text-black">Форум</a>
                <a href="/chat.html" class="text-gray-600 hover:text-black">Чат</a>
                <a href="/settings.html" class="text-gray-600 hover:text-black">Настройки</a>
            </nav>
        </div>
    </header>
    <div class="max-w-4xl mx-auto p-8">
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h1 class="text-2xl font-bold mb-6">Форум</h1>
            <div class="space-y-4" id="topicsList"><div class="text-center py-8 text-gray-500">Загрузка...</div></div>
        </div>
    </div>
    <script>
        const API_URL = '/api';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        async function loadTopics() {
            try {
                const response = await fetch(`${API_URL}/topics`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                const topics = data.topics || [];
                document.getElementById('topicsList').innerHTML = topics.map(t => `<div class="border rounded-lg p-4"><h3 class="font-semibold text-lg">${t.title}</h3><p class="text-sm text-gray-500">${t.author_name} • ${t.replies_count} ответов • ${new Date(t.created_at).toLocaleDateString()}</p><p class="text-gray-600 mt-2">${t.content.substring(0, 150)}...</p></div>`).join('') || '<div class="text-center py-8 text-gray-500">Тем пока нет</div>';
            } catch (e) {
                document.getElementById('topicsList').innerHTML = '<div class="text-center py-8 text-red-500">Ошибка загрузки</div>';
            }
        }
        loadTopics();
    </script>
</body>
</html>
