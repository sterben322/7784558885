<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Форум</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-white text-[#273244] dashboard-page">
<div class="min-h-screen p-6 font-sans">
    <div class="dashboard-shell mx-auto grid max-w-[1460px] grid-cols-[276px_minmax(0,1fr)_330px] rounded-[30px] border border-white/70 bg-white shadow-[0_18px_60px_rgba(162,175,186,0.24)]">
        <aside class="dashboard-sidebar relative flex flex-col border-r border-[#e6eaec] bg-[linear-gradient(180deg,#fbfcfc_0%,#f7f9f9_100%)]">
            <div class="flex h-[82px] items-center gap-4 border-b border-[#e8ecef] px-8">
                <a href="/" class="flex items-center gap-3">
                    <div class="grid h-12 w-12 place-items-center rounded-2xl text-[#3e826e]"><div class="text-[30px]">⛓</div></div>
                    <div class="text-[18px] font-black tracking-[0.08em] text-[#213246]">LASTOP</div>
                </a>
            </div>
            <div class="px-4 py-5">
                <div class="space-y-1.5">
                    <a href="/" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]"><span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-solid fa-house"></i></span><span class="text-[15px] font-medium">Главная</span></a>
                    <a href="/dashboard.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]"><span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-regular fa-newspaper"></i></span><span class="text-[15px] font-medium">Новости</span></a>
                    <a href="/projects.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]"><span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-solid fa-folder-tree"></i></span><span class="text-[15px] font-medium">Проекты</span></a>
                    <a href="/exhibitions.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]"><span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-solid fa-briefcase"></i></span><span class="text-[15px] font-medium">Выставки</span></a>
                    <a href="/events.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]"><span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-solid fa-calendar-days"></i></span><span class="text-[15px] font-medium">Мероприятия</span></a>
                    <a href="/forum.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition bg-[#eff7f3] text-[#4c8d78]"><span class="grid h-8 w-8 place-items-center rounded-xl bg-white shadow-[0_2px_8px_rgba(130,148,160,0.14)]"><i class="fa-regular fa-message"></i></span><span class="text-[15px] font-semibold">Форум</span></a>
                    <a href="/company-profile.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]"><span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-regular fa-building"></i></span><span class="text-[15px] font-medium">Компании</span></a>
                    <a href="/jobs.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]"><span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-solid fa-briefcase"></i></span><span class="text-[15px] font-medium">Резюме и вакансии</span></a>
                </div>
            </div>
            <div class="mt-auto border-t border-[#e8ecef] px-5 py-5">
                <a href="/settings.html" class="flex items-center gap-3 rounded-2xl px-2 py-2">
                    <div class="grid h-11 w-11 place-items-center rounded-full bg-[#d9e2e7] text-sm font-semibold text-[#51606f]" id="footerAvatar">U</div>
                    <div class="min-w-0 flex-1"><div class="truncate text-[15px] font-semibold text-[#3a4758]" id="footerName">Настройки</div></div>
                    <i class="fa-solid fa-gear h-4 w-4 text-[#a0acb8]"></i>
                </a>
            </div>
        </aside>

        <main class="dashboard-main relative bg-white">
            <div class="absolute inset-0 bg-[linear-gradient(180deg,rgba(246,249,250,0.98)_0%,rgba(250,252,252,0.96)_100%)]"></div>
            <div class="absolute inset-y-0 right-0 w-[42%] bg-[radial-gradient(circle_at_top_right,rgba(208,219,226,0.72),transparent_62%)]"></div>
            <header class="dashboard-main-header relative z-10 flex h-[82px] items-center justify-between border-b border-[#e8ecef] px-7">
                <div class="ml-5 flex items-center gap-4">
                    <a href="/chat.html" class="text-[#95a1ad]"><i class="fa-regular fa-bell h-5 w-5"></i></a>
                    <a href="/chat.html" class="text-[#95a1ad]"><i class="fa-regular fa-envelope"></i></a>
                </div>
            </header>

            <div class="relative z-10 px-8 py-6">
                <div class="mb-5 rounded-[24px] border border-[#e7ecef] bg-white/90 p-5 shadow-[0_10px_22px_rgba(178,190,198,0.10)] backdrop-blur">
                    <h1 class="text-[28px] font-semibold tracking-[-0.02em] text-[#2c394b]">Форум</h1>
                    <p class="mt-2 text-[16px] text-[#7e8a97]">Обсуждения и вопросы сообщества.</p>
                </div>
                <section id="topicsList" class="space-y-4"><div class="text-center py-8 text-gray-500">Загрузка...</div></section>
            </div>
        </main>

        <aside class="dashboard-sidebar border-l border-[#e7ebed] bg-[linear-gradient(180deg,#fbfcfc_0%,#f7f9f9_100%)] px-6 py-6">
            <div class="rounded-[24px] border border-[#e8ecee] bg-white p-5 shadow-[0_10px_20px_rgba(178,190,198,0.10)]">
                <h3 class="text-[18px] font-semibold text-[#334153]">Раздел форума</h3>
                <p class="mt-3 text-[15px] text-[#5f6b79]">Если тем пока нет, раздел всё равно открывается корректно и остаётся доступным для новых публикаций.</p>
            </div>
        </aside>
    </div>
</div>
<script>
const API_URL = '/api';
const token = localStorage.getItem('token');

function setUserInfo() {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const name = user.full_name || 'Гость';
    const letter = (name[0] || 'U').toUpperCase();

    const sidebarUserName = document.getElementById('userName');
    if (sidebarUserName) sidebarUserName.textContent = name;
    document.getElementById('topUserName').textContent = name;
    ['userAvatar', 'topAvatar', 'footerAvatar'].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.textContent = letter;
    });
}

function renderTopics(topics) {
    const sample = { title: 'Пример темы: первое обсуждение', author_name: 'Модератор', replies_count: 3, created_at: new Date().toISOString(), content: 'Пример обсуждения: делимся опытом, задаём вопросы и предлагаем идеи для развития раздела.' };
    const merged = [sample, ...topics];
    document.getElementById('topicsList').innerHTML = merged.map(t => `<div class="rounded-[22px] border border-[#e8ecee] bg-white px-6 py-5 shadow-[0_8px_18px_rgba(178,190,198,0.10)]"><h3 class="font-semibold text-lg text-[#2f3c4e]">${t.title}</h3><p class="text-sm text-[#7f8a97] mt-1">${t.author_name} • ${t.replies_count} ответов • ${new Date(t.created_at).toLocaleDateString()}</p><p class="text-[#697685] mt-2">${(t.content || '').substring(0, 150)}...</p></div>`).join('') || '<div class="text-center py-8 text-gray-500">Тем пока нет</div>';
}

async function loadTopics() {
    if (!token) {
        renderTopics([]);
        return;
    }

    try {
        const response = await fetch(`${API_URL}/topics`, { headers: { Authorization: `Bearer ${token}` } });
        const data = await response.json();
        const topics = data.topics || [];
        renderTopics(topics);
    } catch (e) {
        renderTopics([]);
    }
}

setUserInfo();
loadTopics();
</script>
</body>
</html>
