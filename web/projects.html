<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Проекты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-white text-[#273244] dashboard-page">
<div class="min-h-screen p-6">
    <div class="dashboard-shell mx-auto grid min-h-[calc(100vh-3rem)] max-w-[1460px] grid-cols-[276px_minmax(0,1fr)] overflow-hidden rounded-[30px] border border-[#eef2f4] bg-white shadow-[0_18px_60px_rgba(162,175,186,0.12)]">
        <aside class="dashboard-sidebar border-r border-[#e6eaec] bg-white p-6">
            <a href="/" class="mb-6 flex items-center gap-3 text-[#213246]"><div class="text-[30px]">⛓</div><div class="text-[18px] font-black tracking-[0.08em]">LASTOP</div></a>
            <nav class="space-y-2 text-[#5d6978]">
                <a class="block rounded-xl px-4 py-2.5 hover:bg-[#f4f7f7]" href="/dashboard.html">Новости</a>
                <a class="block rounded-xl bg-[#eff7f3] px-4 py-2.5 font-semibold text-[#4c8d78]" href="/projects.html">Проекты</a>
                <a class="block rounded-xl px-4 py-2.5 hover:bg-[#f4f7f7]" href="/exhibitions.html">Выставки</a>
                <a class="block rounded-xl px-4 py-2.5 hover:bg-[#f4f7f7]" href="/events.html">Мероприятия</a>
            </nav>
        </aside>
        <main class="p-8">
            <h1 class="text-3xl font-semibold text-[#2f3c4e]">Проекты</h1>
            <p class="mt-2 text-[#6b7785]">Раздел заполнен карточками проектов, чтобы страница не вела на заглушку.</p>
            <section id="projectsGrid" class="mt-6 grid gap-4 md:grid-cols-2"></section>
        </main>
    </div>
</div>
<script>
const projects = [
    {name: 'B2B Маркетплейс', stage: 'MVP', desc: 'Платформа для поиска поставщиков и закупок.', budget: '₽4.5 млн'},
    {name: 'AI-помощник закупщика', stage: 'Пилот', desc: 'Подсказки по спросу и автоматизация заказов.', budget: '₽2.1 млн'},
    {name: 'Единый логистический кабинет', stage: 'Разработка', desc: 'Мониторинг маршрутов и SLA-поставок.', budget: '₽3.2 млн'},
    {name: 'Кадровый резерв', stage: 'Запуск', desc: 'Поиск специалистов и внутренних команд.', budget: '₽1.4 млн'}
];
const grid = document.getElementById('projectsGrid');
projects.forEach((p) => {
    const el = document.createElement('article');
    el.className = 'rounded-2xl border border-[#e7ecef] bg-white p-5 shadow-[0_8px_18px_rgba(178,190,198,0.10)]';
    el.innerHTML = `<div class="text-xs font-semibold text-[#6e9c88]">${p.stage}</div><h3 class="mt-1 text-xl font-semibold text-[#2f3c4e]">${p.name}</h3><p class="mt-2 text-[#6b7785]">${p.desc}</p><div class="mt-3 text-sm text-[#8a97a4]">Бюджет: ${p.budget}</div>`;
    grid.appendChild(el);
});
</script>
</body>
</html>
