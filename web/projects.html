<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LASTOP GROUP — Проекты</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1E8A4C;--gm:#22A05A;--gl:#E8F5EE;--gp:#F0FAF4;--gmt:#5A8A6A;--gb:#C0DECA;
  --w:#FFF;--bg:#F2F5F3;--t:#1A2A22;--tm:#3A5245;--bdr:#DDE8E2;
  --red:#E04040;--r:8px;--rm:12px;--rl:18px;--rxl:24px;
  --sh:0 2px 12px rgba(30,138,76,.07);--shm:0 6px 24px rgba(30,138,76,.13)
}
html,body{height:100%;overflow:hidden;font-family:'Manrope',sans-serif;background:var(--bg);color:var(--t);font-size:14px}
.shell{display:grid;grid-template-columns:220px 1fr 264px;grid-template-rows:56px 1fr;grid-template-areas:"logo topbar topbar""nav main right";height:100vh;gap:10px;padding:10px}

/* ── LOGO ── */
.logo-cell{grid-area:logo;background:var(--w);border-radius:var(--rl);border:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;gap:10px;text-decoration:none;box-shadow:var(--sh);transition:box-shadow .2s;overflow:hidden}
.logo-cell:hover{box-shadow:var(--shm)}
.logo-cell img{height:34px;width:auto;object-fit:contain;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1.15}
.logo-text .lt1{font-size:13px;font-weight:800;color:var(--g);letter-spacing:.04em}
.logo-text .lt2{font-size:9px;font-weight:600;color:var(--gmt);letter-spacing:.12em;text-transform:uppercase}

/* ── TOPBAR ── */
.topbar{grid-area:topbar;background:var(--w);border-radius:var(--rl);border:1px solid var(--bdr);display:flex;align-items:center;gap:10px;padding:0 14px;box-shadow:var(--sh)}
.search-wrap{flex:1;position:relative;display:flex;align-items:center}
.search-wrap svg{position:absolute;left:11px;color:var(--gmt);pointer-events:none;width:15px;height:15px}
.search-wrap input{width:100%;height:34px;padding:0 12px 0 34px;border:1.5px solid var(--bdr);border-radius:var(--rm);background:var(--gp);font-family:inherit;font-size:13px;color:var(--t);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--gm)}
.search-wrap input::placeholder{color:var(--gmt)}
.icon-btn{position:relative;width:36px;height:36px;border-radius:var(--rm);border:1.5px solid var(--bdr);background:var(--gp);display:grid;place-items:center;cursor:pointer;color:var(--g);transition:background .15s,border-color .15s;flex-shrink:0}
.icon-btn:hover{background:var(--gl);border-color:var(--gb)}
.icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:99px;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--w)}
.br{background:var(--red)}.bgg{background:var(--g)}

/* ── NAV ── */
.nav{grid-area:nav;background:var(--w);border-radius:var(--rxl);border:1px solid var(--bdr);box-shadow:var(--sh);overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;padding:10px 8px;gap:2px}
.nav::-webkit-scrollbar{display:none}
.nav-div{height:1px;background:var(--bdr);margin:6px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;text-decoration:none;color:var(--tm);font-size:13px;font-weight:500;transition:background .15s,color .15s;white-space:nowrap}
.nav-item:hover{background:var(--gp);color:var(--g)}
.nav-item.active{background:var(--g);color:#fff;font-weight:600}
.nav-item.active svg *{stroke:#fff}
.nav-item svg{width:18px;height:18px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

/* ── MAIN ── */
.main{grid-area:main;overflow:hidden;display:flex;flex-direction:column;gap:10px}
.right{grid-area:right;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.right::-webkit-scrollbar{display:none}
.card{background:var(--w);border:1px solid var(--bdr);border-radius:var(--rxl);padding:14px;box-shadow:var(--sh)}
.block-title{font-size:11px;font-weight:700;color:var(--gmt);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}

/* ── TOOLBAR ── */
.toolbar{background:var(--w);border:1px solid var(--bdr);border-radius:var(--rxl);display:flex;align-items:center;gap:8px;padding:10px 14px;flex-shrink:0;box-shadow:var(--sh);flex-wrap:wrap}
.section-toggle{display:flex;background:var(--gp);border-radius:var(--rm);padding:3px;gap:2px;border:1px solid var(--bdr)}
.st{padding:6px 16px;border-radius:var(--r);font-size:13px;font-weight:600;color:var(--gmt);cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.st svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.st.active{background:var(--w);color:var(--g);box-shadow:0 1px 6px rgba(30,138,76,.10)}
.filter-tabs{display:flex;gap:4px;flex-wrap:wrap}
.ftab{padding:5px 12px;border-radius:var(--rm);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:transparent;color:var(--tm);font-family:inherit;transition:all .15s}
.ftab:hover{background:var(--gp);color:var(--g);border-color:var(--gb)}
.ftab.active{background:var(--g);color:#fff;border-color:var(--g)}
.btn-create{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--rm);background:var(--g);border:none;cursor:pointer;color:#fff;font-family:inherit;font-size:12px;font-weight:600;transition:background .15s;white-space:nowrap;flex-shrink:0;margin-left:auto}
.btn-create:hover{background:var(--gm)}
.btn-create svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round}

/* ── FEED ── */
.feed{overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:2px}
.feed::-webkit-scrollbar{width:4px}
.feed::-webkit-scrollbar-thumb{background:var(--gb);border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── PROJECT CARD ── */
.pj-card{background:var(--w);border:1px solid var(--bdr);border-radius:var(--rxl);padding:16px;cursor:pointer;box-shadow:var(--sh);transition:box-shadow .2s,transform .2s;animation:fadeUp .3s ease both}
.pj-card:hover{box-shadow:var(--shm);transform:translateY(-1px)}
.pj-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.pj-cover{width:90px;height:64px;border-radius:var(--rm);flex-shrink:0;position:relative;overflow:hidden;background:linear-gradient(135deg,#8FB5A0 0%,#1E8A4C 100%)}
.pj-cover img{width:100%;height:100%;object-fit:cover;display:block}
.pj-cover-cnt{position:absolute;right:4px;bottom:4px;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px}
.pj-hd{flex:1;min-width:0}
.pj-title{font-size:14px;font-weight:700;color:var(--t);line-height:1.35;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pj-author{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gmt)}
.pj-author-av{width:18px;height:18px;border-radius:4px;color:#fff;font-size:9px;font-weight:700;display:grid;place-items:center;flex-shrink:0}
.pj-badge{padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;flex-shrink:0;white-space:nowrap}
.badge-invest{background:#FAEEDA;border:1px solid #FAC775;color:#633806}
.badge-contract{background:#E6F1FB;border:1px solid #85B7EB;color:#185FA5}
.badge-attn{background:#F0E6FB;border:1px solid #C9ABE8;color:#5E2C8C}
.badge-partner{background:var(--gl);border:1px solid var(--gb);color:var(--g)}

.pj-desc{font-size:12px;color:var(--tm);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pj-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.pill svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.pill-city{background:#E6F1FB;color:#185FA5}
.pill-need{background:#FAEEDA;color:#633806}
.pill-progress{background:var(--gl);color:var(--g)}
.pill-partners{background:#F0E6FB;color:#5E2C8C}

.pj-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{padding:3px 10px;border-radius:99px;background:var(--gp);color:var(--tm);font-size:11px;font-weight:600;border:1px solid var(--bdr)}

.pj-foot{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--bdr)}
.pj-stat{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gmt)}
.pj-stat svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.pj-time{font-size:11px;color:var(--gmt);margin-right:auto}
.btn-respond{padding:6px 18px;border-radius:var(--rm);background:var(--g);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:background .15s;flex-shrink:0}
.btn-respond:hover{background:var(--gm)}
.btn-respond.responded{background:var(--gl);border:1px solid var(--gb);color:var(--g)}

/* ── RIGHT SIDEBAR ── */
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr)}
.stat-row:last-child{border-bottom:none;padding-bottom:0}
.stat-lbl{font-size:12px;color:var(--gmt)}
.stat-val{font-size:13px;font-weight:700;color:var(--t)}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:var(--rm);cursor:pointer;transition:background .15s}
.cat-item:hover{background:var(--gp)}
.cat-name{font-size:12px;color:var(--t);font-weight:500}
.cat-cnt{font-size:11px;color:var(--gmt)}
.my-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--rm);cursor:pointer;transition:background .15s}
.my-item:hover{background:var(--gp)}
.my-logo{width:28px;height:28px;border-radius:var(--r);font-size:11px;font-weight:700;color:#fff;display:grid;place-items:center;flex-shrink:0}
.my-name{font-size:12px;font-weight:600;color:var(--t)}
.my-sub{font-size:10px;color:var(--gmt);margin-top:1px}
.my-status-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0}
.dot-active{background:#22CC66}
.dot-pause{background:#FAC775}
.dot-closed{background:#D3D1C7}
.empty-block{text-align:center;padding:16px 8px;color:var(--gmt)}
.empty-block svg{width:28px;height:28px;fill:none;stroke:var(--gb);stroke-width:1.4;stroke-linecap:round;margin-bottom:8px}
.empty-block p{font-size:12px;line-height:1.5}
.btn-empty{width:100%;padding:7px;border-radius:var(--rm);background:var(--gl);border:1px solid var(--gb);color:var(--g);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:10px}
.btn-empty:hover{background:var(--g);color:#fff;border-color:var(--g)}

/* ── AD ── */
.ad-block{background:#F8F5FF;border:1px solid #DDD0F0;border-radius:var(--rxl);padding:14px;position:relative;overflow:hidden}
.ad-label{position:absolute;top:10px;left:10px;background:#EAE0FA;color:#8060C0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:6px}
.ad-content{margin-top:20px;text-align:center}
.ad-title{font-size:13px;font-weight:700;color:#5040A0}
.ad-sub{font-size:11px;color:#7060B0;margin-top:3px}
.ad-btn{display:block;margin:10px auto 0;padding:7px 20px;border-radius:var(--rm);background:#7060B0;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s}
.ad-btn:hover{opacity:.88}

/* ── SKELETON ── */
.skeleton{background:var(--w);border:1px solid var(--bdr);border-radius:var(--rxl);padding:16px}
.sl{background:var(--bg);border-radius:var(--r);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,25,18,.45);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--w);border-radius:var(--rxl);border:1px solid var(--bdr);box-shadow:0 24px 60px rgba(30,138,76,.15);padding:24px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;transform:translateY(14px);transition:transform .22s}
.modal-bg.open .modal{transform:translateY(0)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--gb);border-radius:99px}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;position:sticky;top:-24px;background:var(--w);padding-top:0;z-index:1}
.modal-head h3{font-size:16px;font-weight:800;color:var(--t)}
.modal-x{width:30px;height:30px;border-radius:var(--r);background:var(--gp);border:none;cursor:pointer;display:grid;place-items:center;color:var(--gmt);transition:background .15s;flex-shrink:0}
.modal-x:hover{background:var(--gl);color:var(--g)}
.modal-x svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--gmt);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:5px}
.form-input{width:100%;border:1.5px solid var(--bdr);border-radius:var(--rm);padding:9px 12px;font-family:inherit;font-size:13px;color:var(--t);outline:none;transition:border-color .2s;background:var(--gp)}
.form-input:focus{border-color:var(--gm)}
.form-input::placeholder{color:var(--gmt)}
textarea.form-input{resize:none;height:90px;line-height:1.55}
select.form-input{cursor:pointer;-webkit-appearance:none;appearance:none}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-section{font-size:11px;font-weight:700;color:var(--gmt);letter-spacing:.06em;text-transform:uppercase;padding:8px 0 4px;border-top:1px solid var(--bdr);margin-bottom:8px;margin-top:4px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--bdr)}
.btn-sec{padding:8px 18px;border-radius:var(--rm);border:1.5px solid var(--bdr);background:var(--w);font-family:inherit;font-size:13px;font-weight:600;color:var(--tm);cursor:pointer;transition:background .15s}
.btn-sec:hover{background:var(--gp)}
.btn-pri{padding:8px 22px;border-radius:var(--rm);border:none;background:var(--g);font-family:inherit;font-size:13px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s}
.btn-pri:hover{opacity:.88}
.btn-pri:disabled{background:var(--gb);cursor:not-allowed}

/* ── UPLOAD (images in modal) ── */
.img-upload{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.img-slot{aspect-ratio:4/3;border-radius:var(--rm);border:1.5px dashed var(--bdr);background:var(--gp);display:grid;place-items:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s,background .15s}
.img-slot:hover{border-color:var(--g);background:var(--gl)}
.img-slot svg{width:20px;height:20px;color:var(--gmt);fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round}
.img-slot img{width:100%;height:100%;object-fit:cover;display:block}
.img-slot .rm{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:grid;place-items:center;border:none;cursor:pointer;z-index:2}
.img-slot .rm svg{width:10px;height:10px;stroke:#fff;stroke-width:2.5;color:#fff}

/* ── GOALS / NEEDS (in modal) ── */
.list-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.list-row .form-input{flex:1}
.rm-btn{width:34px;height:34px;border-radius:var(--rm);border:1.5px solid var(--bdr);background:var(--w);color:var(--gmt);cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:all .15s}
.rm-btn:hover{background:#FDECEC;border-color:#F0A0A0;color:var(--red)}
.rm-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.btn-add{padding:6px 14px;border-radius:var(--rm);border:1.5px dashed var(--gb);background:var(--gp);color:var(--g);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-add:hover{background:var(--gl);border-color:var(--g);border-style:solid}
.needs-row{display:grid;grid-template-columns:2fr 1fr 1fr 34px;gap:6px;margin-bottom:6px;align-items:center}
.needs-row .form-input{padding:7px 10px;font-size:12px}

/* ── DETAIL PANEL ── */
.detail-panel{position:fixed;top:0;right:-520px;width:520px;max-width:92vw;height:100vh;background:var(--w);border-left:1px solid var(--bdr);box-shadow:-4px 0 30px rgba(30,138,76,.08);z-index:150;transition:right .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
.detail-panel.open{right:0}
.detail-panel::-webkit-scrollbar{width:4px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--gb);border-radius:99px}
.dp-close{position:sticky;top:0;background:var(--w);padding:12px 16px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;z-index:1}
.dp-close-btn{width:30px;height:30px;border-radius:var(--r);background:var(--gp);border:none;cursor:pointer;display:grid;place-items:center;color:var(--gmt);flex-shrink:0}
.dp-close-btn:hover{background:var(--gl);color:var(--g)}
.dp-close-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.dp-close span{font-size:13px;font-weight:700;color:var(--t)}
.dp-body{padding:16px;flex:1}

.dp-gallery{position:relative;border-radius:var(--rl);overflow:hidden;margin-bottom:14px;background:var(--gp);border:1px solid var(--bdr)}
.dp-main-img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:linear-gradient(135deg,#8FB5A0 0%,#1E8A4C 100%)}
.dp-gallery-nav{position:absolute;top:45%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.92);border:1px solid var(--bdr);display:grid;place-items:center;cursor:pointer;color:var(--t)}
.dp-gallery-nav.prev{left:8px}
.dp-gallery-nav.next{right:8px}
.dp-gallery-nav:hover{background:var(--w)}
.dp-gallery-nav svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.dp-thumbs{display:flex;gap:6px;padding:6px;background:var(--gp);border-top:1px solid var(--bdr);overflow-x:auto}
.dp-thumbs::-webkit-scrollbar{height:4px}
.dp-thumbs::-webkit-scrollbar-thumb{background:var(--gb);border-radius:99px}
.dp-thumb{width:60px;height:42px;border-radius:var(--r);overflow:hidden;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:border-color .15s;background:var(--bdr)}
.dp-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.dp-thumb.active{border-color:var(--g)}

.dp-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.dp-av{width:48px;height:48px;border-radius:12px;font-size:18px;font-weight:800;color:#fff;display:grid;place-items:center;flex-shrink:0}
.dp-name{font-size:18px;font-weight:800;color:var(--t);line-height:1.25;margin-bottom:3px}
.dp-sub{font-size:12px;color:var(--gmt)}
.dp-sub a{color:var(--g);text-decoration:none;font-weight:600}
.dp-sub a:hover{text-decoration:underline}
.dp-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.dp-section{font-size:11px;font-weight:700;color:var(--gmt);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bdr)}
.dp-text{font-size:13px;color:var(--tm);line-height:1.65;margin-bottom:14px;white-space:pre-wrap}
.dp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}

.dp-goals{list-style:none;padding:0;margin:0 0 14px}
.dp-goals li{display:flex;gap:10px;align-items:flex-start;padding:6px 0;font-size:13px;color:var(--tm);line-height:1.55}
.dp-goals li svg{width:16px;height:16px;flex-shrink:0;color:var(--g);margin-top:2px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.dp-needs{border:1px solid var(--bdr);border-radius:var(--rm);overflow:hidden;margin-bottom:14px}
.dp-needs-head{display:grid;grid-template-columns:2fr 1fr 110px;background:var(--gp);padding:8px 12px;font-size:10px;font-weight:700;color:var(--gmt);text-transform:uppercase;letter-spacing:.05em}
.dp-needs-row{display:grid;grid-template-columns:2fr 1fr 110px;padding:10px 12px;border-top:1px solid var(--bdr);font-size:12px;align-items:center}
.dp-need-name{font-weight:600;color:var(--t)}
.dp-need-amt{color:var(--tm);font-weight:500;text-align:right}
.dp-need-status{text-align:right}
.dp-need-status .pill{font-size:10px;padding:2px 8px}

.dp-actions{display:flex;gap:8px;padding:14px 16px;border-top:1px solid var(--bdr);position:sticky;bottom:0;background:var(--w)}
.dp-btn-pri{flex:1;padding:10px;border-radius:var(--rm);background:var(--g);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .15s;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.dp-btn-pri:hover{background:var(--gm)}
.dp-btn-sec{padding:10px 16px;border-radius:var(--rm);border:1.5px solid var(--bdr);background:var(--w);font-family:inherit;font-size:13px;font-weight:600;color:var(--tm);cursor:pointer;transition:background .15s}
.dp-btn-sec:hover{background:var(--gp)}
.panel-overlay{position:fixed;inset:0;z-index:140;background:rgba(15,25,18,.25);display:none}
.panel-overlay.show{display:block}

@media(max-width:1200px){.shell{grid-template-columns:220px 1fr 240px}}
@media(max-width:1000px){.shell{grid-template-columns:220px 1fr;grid-template-areas:"logo topbar""nav main"}.right{display:none}}
@media(max-width:740px){.shell{grid-template-columns:48px 1fr}.nav-item span,.logo-text{display:none}.nav-item{justify-content:center;padding:10px}.filter-tabs{display:none}.detail-panel{width:100%}}
</style>
</head>

<script>
const API='/api', tk=()=>localStorage.getItem('token');
const COLORS=['#5AB080','#3A90C0','#9060C0','#C07030','#E04040','#1A8A6A','#B05090','#208090','#C04030','#3B6D11'];
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escAttr(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function avc(s){return COLORS[(s||'').charCodeAt(0)%COLORS.length]||COLORS[0];}
function letter(s){return((s||'?')[0]).toUpperCase();}
function ago(ts){if(!ts)return'';const m=Math.max(1,Math.floor((Date.now()-new Date(ts))/60000));if(m<60)return m+' мин назад';if(m<1440)return Math.floor(m/60)+' ч назад';if(m<10080)return Math.floor(m/1440)+' д назад';return new Date(ts).toLocaleDateString('ru-RU',{day:'2-digit',month:'short'});}
function num(n){return n>=1000?(n/1000).toFixed(1).replace(/\.0$/,'')+'к':n;}
function fmtMoney(n){if(!n)return'';if(n>=1000000)return(n/1000000).toFixed(1).replace(/\.0$/,'')+' млн ₽';if(n>=1000)return Math.round(n/1000)+'к ₽';return n+' ₽';}

let mode='company', currentGoal='', myUserID=0;
const projectStore=new Map();

/* ── AUTH ── */
(async()=>{
  if(!tk()){location.href='/login.html';return;}
  try{
    const r=await fetch(API+'/me',{headers:{Authorization:'Bearer '+tk()}});
    if(!r.ok)throw 0;
    const{user={}}=await r.json();
    myUserID=user.id||0;
    localStorage.setItem('user',JSON.stringify(user));
  }catch{
    const u=JSON.parse(localStorage.getItem('user')||'{}');
    myUserID=u.id||0;
    if(!myUserID){location.href='/login.html';}
  }
})();

/* ── INIT ── */
window.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(location.search);
  if(p.get('tab')==='user') mode='user';
  applyMode();
  loadFeed();
  loadStats();
  loadMyItems();
  setupFilters();
  setupSearch();
  setupImageUpload();
});

/* ── MODE SWITCH ── */
function setMode(m){
  mode=m; applyMode();
  loadFeed();
  loadStats();
  loadMyItems();
  history.replaceState(null,'',`/projects.html?tab=${m}`);
}
function applyMode(){
  const isCo=mode==='company';
  document.getElementById('btnCompany').classList.toggle('active',isCo);
  document.getElementById('btnUser').classList.toggle('active',!isCo);
  document.title=`LASTOP GROUP — Проекты ${isCo?'компаний':'пользователей и сообществ'}`;
  currentGoal='';
  document.querySelectorAll('.ftab').forEach(b=>b.classList.toggle('active',b.dataset.goal===''));
}

/* ── FILTERS / SEARCH ── */
function setupFilters(){
  document.getElementById('filterTabs').addEventListener('click',e=>{
    const btn=e.target.closest('.ftab'); if(!btn)return;
    document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentGoal=btn.dataset.goal;
    loadFeed();
  });
}
let sT;
function setupSearch(){
  document.getElementById('searchInput').addEventListener('input',e=>{
    clearTimeout(sT);
    const q=e.target.value.trim();
    sT=setTimeout(()=>loadFeed(q),350);
  });
}

/* ── LOAD FEED ── */
async function loadFeed(q=''){
  const feed=document.getElementById('feed');
  feed.innerHTML=skels(4);
  let url=`${API}/projects?owner_kind=${mode}&limit=30`;
  if(currentGoal) url+=`&goal=${encodeURIComponent(currentGoal)}`;
  if(q) url+=`&q=${encodeURIComponent(q)}`;
  let list=[];
  try{
    const r=await fetch(url,{headers:{Authorization:'Bearer '+tk()}});
    if(!r.ok)throw 0;
    const data=await r.json();
    list=Array.isArray(data.projects)?data.projects:[];
  }catch{}
  if(!list.length){
    list=mode==='company'?demoCompanyProjects():demoUserProjects();
  }
  // сохраняем в store для открытия деталки по id без JSON в onclick
  projectStore.clear();
  list.forEach(p=>projectStore.set(String(p.id),p));
  render(list);
}

function render(list){
  const feed=document.getElementById('feed');
  if(!list.length){
    feed.innerHTML=`<div style="padding:40px;text-align:center;color:var(--gmt)">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--gb)" stroke-width="1.4" stroke-linecap="round" style="margin-bottom:12px"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <div style="font-size:14px;font-weight:700;margin-bottom:6px">Проекты не найдены</div>
      <div style="font-size:12px">Попробуйте изменить фильтры или создайте первым</div>
    </div>`;
    return;
  }
  feed.innerHTML=list.map((p,i)=>buildProjectCard(p,i)).join('');
  feed.style.paddingBottom='10px';
}

/* ── PROJECT CARD ── */
function goalBadge(goal){
  const map={
    invest:{cls:'badge-invest',lbl:'Ищет инвестора'},
    contract:{cls:'badge-contract',lbl:'Ищет подрядчиков'},
    partner:{cls:'badge-partner',lbl:'Ищет партнёров'},
    attn:{cls:'badge-attn',lbl:'Внимание к проекту'}
  };
  return map[goal]||{cls:'badge-partner',lbl:'Открыт'};
}

function buildProjectCard(p,i){
  const authorName=p.author_name||p.owner_name||'Без автора';
  const color=avc(authorName);
  const b=goalBadge(p.goal);
  const delay=(i*0.05).toFixed(2);
  const imgs=Array.isArray(p.images)?p.images.filter(Boolean):[];
  const imgCount=imgs.length;
  const firstImg=imgCount?imgs[0]:'';
  const tags=(p.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const pills=summarizePills(p);
  const pid=String(p.id);
  return`<div class="pj-card" style="animation-delay:${delay}s" onclick="openProjectDetail('${escAttr(pid)}')">
    <div class="pj-head">
      <div class="pj-cover" style="background:linear-gradient(135deg, ${color} 0%, #1E8A4C 100%)">
        ${firstImg?`<img src="${escAttr(firstImg)}" alt="" onerror="this.remove()">`:''}
        ${imgCount>1?`<div class="pj-cover-cnt">+${imgCount-1}</div>`:''}
      </div>
      <div class="pj-hd">
        <div class="pj-title">${esc(p.title||'Проект')}</div>
        <div class="pj-author">
          <div class="pj-author-av" style="background:${color}">${letter(authorName)}</div>
          ${esc(authorName)}${p.city?' · '+esc(p.city):''}
        </div>
      </div>
      <span class="pj-badge ${b.cls}">${b.lbl}</span>
    </div>
    ${p.description?`<div class="pj-desc">${esc(p.description)}</div>`:''}
    ${pills?`<div class="pj-pills">${pills}</div>`:''}
    ${tags?`<div class="pj-tags">${tags}${(p.tags||[]).length>4?`<span class="tag">+${(p.tags||[]).length-4}</span>`:''}</div>`:''}
    <div class="pj-foot">
      <div class="pj-stat"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${num(p.views_count||0)}</div>

function summarizePills(p){
  const out=[];
  const needs=p.needs||[];
  const moneyNeed=needs.find(n=>/инвест|финанс|средст/i.test(n.name||'')||n.unit==='₽'||n.unit==='rub');
  if(moneyNeed){
    const amt=moneyNeed.amount_text||(moneyNeed.amount?fmtMoney(moneyNeed.amount):'');
    if(amt)out.push(`<span class="pill pill-need"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>${esc(amt)}</span>`);
  }
  const contractorsNeed=needs.find(n=>/подряд|монтаж|бригад|парт|ритейл|дистриб/i.test(n.name||''));
  if(contractorsNeed){
    const amt=contractorsNeed.amount_text||contractorsNeed.amount||'';
    if(amt)out.push(`<span class="pill pill-partners"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${esc(amt)}</span>`);
  }
  if(p.progress!=null){
    out.push(`<span class="pill pill-progress"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><polyline points="7,14 11,10 15,14 21,8"/></svg>${p.progress}% собрано</span>`);
  }
  if(p.city)out.push(`<span class="pill pill-city"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(p.city)}</span>`);
  return out.join('');
}

async function respondProject(id, btn){
  if(btn.classList.contains('responded'))return;
  try{
    const r=await fetch(`${API}/projects/${id}/respond`,{method:'POST',headers:{Authorization:'Bearer '+tk()}});

    throw 0;
  }catch{
    btn.textContent='✓ Отклик отправлен';

function addNeed(){needsState.push({name:'',amount:'',status:'open'});renderNeeds();}
function removeNeed(i){needsState.splice(i,1);if(!needsState.length)needsState=[{name:'',amount:'',status:'open'}];renderNeeds();}

function setupImageUpload(){
  const input=document.getElementById('imgInput');
  input.addEventListener('change',e=>{
    const files=Array.from(e.target.files||[]).slice(0,8-imagesState.length);
    files.forEach(f=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        imagesState.push(ev.target.result);
        renderImgSlots();
      };
      reader.readAsDataURL(f);
    });
    input.value='';
  });
  renderImgSlots();
}
function renderImgSlots(){
  const host=document.getElementById('imgUpload');
  const items=imagesState.map((src,i)=>`
    <div class="img-slot" style="border-style:solid;cursor:default">
      <img src="${escAttr(src)}" alt="">
      <button type="button" class="rm" onclick="removeImg(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  `);
  if(imagesState.length<8){
    items.push(`<div class="img-slot" onclick="document.getElementById('imgInput').click()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`);
  }
  host.innerHTML=items.join('');
}
function removeImg(i){imagesState.splice(i,1);renderImgSlots();}

/* ── SUBMIT ── */
async function submitProject(){
  const title=document.getElementById('pjTitle').value.trim();
  if(!title){alert('Укажите название проекта');return;}
  const btn=document.getElementById('pjSubmitBtn');
  btn.disabled=true;btn.textContent='Публикация…';
  const cat=document.getElementById('pjCategory').value;
  const goalMap={'Инвестиции':'invest','Подрядчики':'contract','Партнёры':'partner','Внимание к проекту':'attn'};
  const body={
    author_type:document.getElementById('pjAuthorType').value,
    title,
    category:cat,
    goal:goalMap[cat]||'partner',
    city:document.getElementById('pjCity').value.trim(),
    tags:document.getElementById('pjTags').value.split(',').map(s=>s.trim()).filter(Boolean),
    goals:goalsState.filter(Boolean),
    description:document.getElementById('pjDesc').value.trim(),
    needs:needsState.filter(n=>(n.name||'').trim()).map(n=>({name:n.name.trim(),amount_text:n.amount,status:n.status})),
    images:imagesState,
  };
  try{
    const r=await fetch(`${API}/projects`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+tk()},body:JSON.stringify(body)});
    if(r.ok){closeProjectModal();loadFeed();loadMyItems();loadStats();}
    else throw 0;
  }catch{
    closeProjectModal();
    loadFeed();loadMyItems();
  }
  btn.disabled=false;btn.textContent='Опубликовать проект';
}
