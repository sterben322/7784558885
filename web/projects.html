<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LASTOP GROUP — Проекты</title>
  <link href="/assets/styles.css" rel="stylesheet">
  <style>
    body{font-family:Arial,sans-serif;background:#f3f6f4;color:#1f2f26;margin:0}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .top{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
    input,select,button{padding:10px;border-radius:10px;border:1px solid #d7e3dd}
    button{background:#1E8A4C;color:#fff;border:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
    .card{background:#fff;border:1px solid #dbe6e1;border-radius:14px;padding:14px}
    .meta{font-size:12px;color:#5a7a68;margin-top:6px}
    .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .tag{background:#eef7f1;padding:3px 8px;border-radius:999px;font-size:12px}
    .muted{color:#678070;font-size:13px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Проекты</h1>
  <div class="top">
    <select id="mode"><option value="company">От компаний</option><option value="user">От пользователей</option></select>
    <select id="goal"><option value="">Все цели</option><option value="invest">Инвестиции</option><option value="contract">Подрядчики</option><option value="partner">Партнёры</option><option value="attn">Внимание</option></select>
    <input id="q" placeholder="Поиск проектов..." />
    <button id="reload">Обновить</button>
  </div>
  <div id="stats" class="muted"></div>
  <div id="grid" class="grid"></div>
</div>
<script>
const API='/api';
const tk=()=>localStorage.getItem('token');
const grid=document.getElementById('grid');
const stats=document.getElementById('stats');

async function req(url, opts={}){
  const r = await fetch(url, { ...opts, headers:{ ...(opts.headers||{}), Authorization:'Bearer '+tk() }});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}

function renderProjects(projects){
  grid.innerHTML = projects.map(p=>`
    <article class="card">
      <h3>${esc(p.title)}</h3>
      <div class="meta">${esc(p.author_name)}${p.city?` · ${esc(p.city)}`:''} · ${new Date(p.created_at).toLocaleDateString('ru-RU')}</div>
      <p>${esc(p.description||'')}</p>
      <div class="tags">${(p.tags||[]).slice(0,5).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      <div class="meta">Просмотры: ${p.views_count||0} · Отклики: ${p.responses_count||0}</div>
      <button onclick="respond('${p.id}', this)" ${p.is_responded?'disabled':''}>${p.is_responded?'Отклик отправлен':'Откликнуться'}</button>
    </article>
  `).join('');
}

async function load(){
  if(!tk()){ location.href='/login.html'; return; }
  const owner_kind = document.getElementById('mode').value;
  const goal = document.getElementById('goal').value;
  const q = document.getElementById('q').value.trim();
  const params = new URLSearchParams({owner_kind, limit:'30'});
  if(goal) params.set('goal', goal);
  if(q) params.set('q', q);
  const [projectsData, statsData] = await Promise.all([
    req(`${API}/projects?`+params.toString()),
    req(`${API}/projects/stats?owner_kind=${owner_kind}`)
  ]);
  renderProjects(projectsData.projects||[]);
  const s=statsData.stats||{};
  stats.textContent = `Всего: ${s.total||0} · От компаний: ${s.companies||0} · От пользователей: ${s.users||0} · Новых за 7 дней: ${s.new_week||0}`;
}

async function respond(id, btn){
  await req(`${API}/projects/${id}/respond`, {method:'POST'});
  btn.textContent='Отклик отправлен';
  btn.disabled=true;
}
window.respond = respond;

document.getElementById('reload').onclick = load;
window.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
