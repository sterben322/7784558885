<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Главная</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-white text-[#273244] dashboard-page">
<div class="h-screen p-6 font-sans">
    <div class="dashboard-shell mx-auto grid h-full max-w-[1460px] grid-cols-[276px_minmax(0,1fr)_330px] overflow-hidden rounded-[30px] border border-[#eef2f4] bg-white shadow-[0_18px_60px_rgba(162,175,186,0.12)]">
        <aside class="dashboard-sidebar relative flex h-full flex-col border-r border-[#e6eaec] bg-white">
            <div class="flex h-[82px] items-center gap-4 border-b border-[#e8ecef] px-8">
                <a href="/" class="flex items-center gap-3">
                    <div class="grid h-12 w-12 place-items-center rounded-2xl text-[#3e826e]"><div class="text-[30px]">⛓</div></div>
                    <div class="text-[18px] font-black tracking-[0.08em] text-[#213246]">LASTOP</div>
                </a>
            </div>

            <div class="px-4 py-5">
                <div class="space-y-1.5">
                    <a href="/" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition bg-[#eff7f3] text-[#4c8d78]">
                        <span class="grid h-8 w-8 place-items-center rounded-xl bg-white shadow-[0_2px_8px_rgba(130,148,160,0.14)]"><i class="fa-solid fa-house"></i></span>
                        <span class="text-[15px] font-semibold">Главная</span>
                    </a>
                    <a href="/dashboard.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]">
                        <span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-regular fa-newspaper"></i></span>
                        <span class="text-[15px] font-medium">Новости</span>
                    </a>
                    <a href="/projects.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]">
                        <span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-solid fa-folder-tree"></i></span>
                        <span class="text-[15px] font-medium">Проекты</span>
                    </a>
                    <a href="/exhibitions.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]">
                        <span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-solid fa-briefcase"></i></span>
                        <span class="text-[15px] font-medium">Выставки</span>
                    </a>
                    <a href="/events.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]">
                        <span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-solid fa-calendar-days"></i></span>
                        <span class="text-[15px] font-medium">Мероприятия</span>
                    </a>
                    <a href="/forum.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]">
                        <span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-regular fa-message"></i></span>
                        <span class="text-[15px] font-medium">Форум</span>
                    </a>
                    <a href="/company.html" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition text-[#5d6978] hover:bg-[#f4f7f7]">
                        <span class="grid h-8 w-8 place-items-center rounded-xl"><i class="fa-regular fa-building"></i></span>
                        <span class="text-[15px] font-medium">Компании</span>
                    </a>
                </div>
            </div>

            <div class="mt-auto border-t border-[#e8ecef] px-5 py-5">
                <a href="/settings.html" class="flex items-center gap-3 rounded-2xl px-2 py-2">
                    <div class="grid h-11 w-11 place-items-center rounded-full bg-[#d9e2e7] text-sm font-semibold text-[#51606f]" id="footerAvatar">U</div>
                    <div class="min-w-0 flex-1"><div class="truncate text-[15px] font-semibold text-[#3a4758]" id="footerName">Настройки</div></div>
                    <i class="fa-solid fa-gear h-4 w-4 text-[#a0acb8]"></i>
                </a>
            </div>
        </aside>

        <main class="dashboard-main relative flex h-full flex-col bg-white">
            <header class="dashboard-main-header sticky top-0 z-20 flex h-[82px] items-center justify-between border-b border-[#e8ecef] bg-white px-7">
                <div class="flex w-full max-w-[770px] items-center gap-3 rounded-2xl border border-[#edf0f2] bg-white px-4 py-3">
                    <i class="fa-solid fa-magnifying-glass h-5 w-5 text-[#95a1ad]"></i>
                    <input class="w-full bg-transparent text-[15px] text-[#324154] outline-none placeholder:text-[#a1acb5]" placeholder="Поиск по разделам" />
                </div>

                <div class="ml-5 flex items-center gap-4">
                    <a href="/chat.html" class="text-[#95a1ad]"><i class="fa-regular fa-bell h-5 w-5"></i></a>
                    <a href="/chat.html" class="text-[#95a1ad]"><i class="fa-regular fa-envelope"></i></a>
                    <a href="/profile.html" class="flex items-center gap-3 rounded-2xl px-2 py-2">
                        <div class="grid h-10 w-10 place-items-center rounded-full bg-[#6fa488] text-sm font-semibold text-white" id="topAvatar">U</div>
                        <div class="text-[15px] font-semibold text-[#445164]" id="topUserName">Гость</div>
                        <i class="fa-solid fa-chevron-down h-4 w-4 text-[#9aa7b3]"></i>
                    </a>
                </div>
            </header>

            <div class="relative z-10 flex-1 overflow-y-auto px-8 py-6">
                <div class="mb-5 rounded-[24px] border border-[#e7ecef] bg-white/90 p-5 shadow-[0_10px_22px_rgba(178,190,198,0.10)] backdrop-blur">
                    <h2 class="text-[28px] font-semibold tracking-[-0.02em] text-[#2c394b]">Новости</h2>
                    <p class="mt-2 text-[16px] text-[#7e8a97]">В центральном блоке выводятся новости из раздела «Новости».</p>
                </div>

                <section id="mainNewsFeed" class="space-y-4"></section>
            </div>
        </main>

        <aside class="dashboard-sidebar h-full overflow-y-auto border-l border-[#e7ebed] bg-white px-6 py-6">
            <div class="rounded-[24px] border border-[#e8ecee] bg-white p-5 shadow-[0_10px_20px_rgba(178,190,198,0.10)]">
                <h3 class="text-[18px] font-semibold text-[#334153]">Быстрые переходы</h3>
                <div class="mt-4 space-y-3 text-[15px] text-[#5f6b79]">
                    <a class="block rounded-xl border border-[#edf0f2] px-3 py-2 hover:bg-[#f8fafb]" href="/dashboard.html">Все новости</a>
                    <a class="block rounded-xl border border-[#edf0f2] px-3 py-2 hover:bg-[#f8fafb]" href="/forum.html">Обсуждения на форуме</a>
                    <a class="block rounded-xl border border-[#edf0f2] px-3 py-2 hover:bg-[#f8fafb]" href="/company.html">Каталог компаний</a>
                </div>
            </div>
        </aside>
    </div>
</div>

<script>
const FEED_SOURCE = [
    {
        title: 'Рост деловой активности в производственном секторе',
        excerpt: 'Компании расширяют экспортные каналы и ищут партнеров для совместных поставок оборудования и сырья.',
        category: 'Экономика',
        author: 'Редакция LASTOP',
        minutesAgo: 15,
        tags: ['экспорт', 'партнерство', 'производство']
    },
    {
        title: 'Новые логистические коридоры для малого и среднего бизнеса',
        excerpt: 'На форуме обсудили альтернативные маршруты и снижение издержек на доставку в страны СНГ и Ближнего Востока.',
        category: 'Логистика',
        author: 'Команда аналитики',
        minutesAgo: 34,
        tags: ['логистика', 'снг', 'маршруты']
    },
    {
        title: 'Технологические тренды 2026: автоматизация закупок',
        excerpt: 'Предприниматели внедряют AI-инструменты для прогноза спроса и оптимизации складских запасов.',
        category: 'Технологии',
        author: 'LASTOP Insights',
        minutesAgo: 58,
        tags: ['ai', 'закупки', 'автоматизация']
    }
];

function setUserInfo() {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const name = user.full_name || 'Гость';
    const letter = (name[0] || 'U').toUpperCase();

    const sidebarUserName = document.getElementById('userName');
    if (sidebarUserName) sidebarUserName.textContent = name;
    ['userAvatar', 'topAvatar', 'footerAvatar'].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.textContent = letter;
    });
    document.getElementById('topUserName').textContent = name;
}

function createNewsCard(item, idx) {
    const article = document.createElement('article');
    article.className = 'rounded-[22px] border border-[#e8ecee] bg-white px-6 py-5 shadow-[0_8px_18px_rgba(178,190,198,0.10)]';
    article.innerHTML = `
        <div class="flex items-start justify-between gap-4">
            <div class="min-w-0 flex-1">
                <div class="mb-2 inline-flex items-center gap-2 rounded-full bg-[#eef7f2] px-3 py-1 text-xs font-semibold text-[#5f8f7b]">${item.category}</div>
                <h3 class="text-[22px] font-semibold leading-[1.25] text-[#2f3c4e]">${item.title}</h3>
                <p class="mt-3 text-[16px] leading-7 text-[#697685]">${item.excerpt}</p>
            </div>
            <div class="text-right text-[13px] text-[#95a1ad]">
                <div>${item.minutesAgo} мин назад</div>
                <div class="mt-1 font-medium text-[#61707f]">${item.author}</div>
            </div>
        </div>
        <div class="mt-4 flex flex-wrap gap-2.5">
            ${item.tags.map((tag) => `<span class="rounded-full bg-[#eef7f2] px-3 py-1.5 text-[13px] font-medium text-[#6e9c88]">#${tag}</span>`).join('')}
        </div>
        <div class="mt-4 text-sm text-[#8f9ba8]">Публикация #${idx + 1}</div>
    `;
    return article;
}

function renderMainNews() {
    const feed = document.getElementById('mainNewsFeed');
    FEED_SOURCE.forEach((item, idx) => feed.appendChild(createNewsCard(item, idx)));
}

setUserInfo();
renderMainNews();
</script>
</body>
</html>
