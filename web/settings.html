<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LASTOP | Настройки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-gray-50">
    <header class="bg-white border-b">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/dashboard.html" class="font-bold text-lg">LASTOP</a>
            <nav class="flex items-center gap-4 text-sm flex-wrap justify-end">
                <a href="/dashboard.html" class="text-gray-600 hover:text-black">Главная</a>
                <a href="/dashboard.html#communities" class="text-gray-600 hover:text-black">Сообщества</a>
                <a href="/company.html" class="text-gray-600 hover:text-black">Компании</a>
                <a href="/jobs.html" class="text-gray-600 hover:text-black">Резюме и вакансии</a>
                <a href="/forum.html" class="text-gray-600 hover:text-black">Форум</a>
                <a href="/chat.html" class="text-gray-600 hover:text-black">Чат</a>
                <a href="/settings.html" class="text-gray-600 hover:text-black">Настройки</a>
            </nav>
        </div>
    </header>
    <div class="max-w-2xl mx-auto p-8">
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h1 class="text-2xl font-bold mb-6">Настройки</h1>
            <div class="space-y-6">
                <div>
                    <h3 class="font-semibold mb-3">Уведомления</h3>
                    <label class="flex items-center space-x-3"><input type="checkbox" class="w-4 h-4"><span>Email уведомления</span></label>
                    <label class="flex items-center space-x-3 mt-2"><input type="checkbox" class="w-4 h-4"><span>Push уведомления</span></label>
                </div>
                <div>
                    <h3 class="font-semibold mb-3">Конфиденциальность</h3>
                    <label class="flex items-center space-x-3"><input type="checkbox" class="w-4 h-4"><span>Закрытый профиль</span></label>
                </div>
                <button onclick="window.location.href='/stub.html?section=Смена%20пароля'" class="px-4 py-2 bg-gray-100 rounded-lg">Сменить пароль</button>
            </div>
        </div>
    </div>
    <script>
        if (!localStorage.getItem('token')) window.location.href = '/login.html';
    </script>
</body>
</html>
