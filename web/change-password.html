<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LASTOP | Смена пароля</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="bg-[#f8fafb] text-[#273244]">
  <main class="mx-auto min-h-screen max-w-lg px-4 py-12">
    <div class="rounded-2xl border border-[#e7ecef] bg-white p-6 shadow-[0_10px_24px_rgba(162,175,186,0.12)]">
      <h1 class="text-2xl font-semibold">Смена пароля</h1>
      <p class="mt-2 text-sm text-[#6b7785]">Форма готова для интеграции с API обновления пароля.</p>
      <form class="mt-6 space-y-4">
        <input type="password" placeholder="Текущий пароль" class="green-focus w-full rounded-xl border border-[#dbe3e8] px-4 py-2.5" />
        <input type="password" placeholder="Новый пароль" class="green-focus w-full rounded-xl border border-[#dbe3e8] px-4 py-2.5" />
        <input type="password" placeholder="Повторите новый пароль" class="green-focus w-full rounded-xl border border-[#dbe3e8] px-4 py-2.5" />
        <button type="button" class="w-full rounded-xl bg-[#4c8d78] px-4 py-2.5 font-medium text-white">Сохранить</button>
      </form>
    </div>
  </main>
</body>
</html>
