<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Сообщество</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .community-cover { background: linear-gradient(135deg, #667eea, #764ba2); height: 150px; border-radius: 16px 16px 0 0; }
        .community-avatar { margin-top: -60px; border: 4px solid white; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    </style>
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-white">
    <header class="bg-white border-b">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/dashboard.html" class="font-bold text-lg">LASTOP</a>
            <nav class="flex items-center gap-4 text-sm flex-wrap justify-end">
                <a href="/dashboard.html" class="text-gray-600 hover:text-black">Главная</a>
                <a href="/dashboard.html#communities" class="text-gray-600 hover:text-black">Сообщества</a>
                <a href="/company-profile.html" class="text-gray-600 hover:text-black">Компании</a>
                <a href="/jobs.html" class="text-gray-600 hover:text-black">Резюме и вакансии</a>
                <a href="/forum.html" class="text-gray-600 hover:text-black">Форум</a>
                <a href="/chat.html" class="text-gray-600 hover:text-black">Чат</a>
                <a href="/settings.html" class="text-gray-600 hover:text-black">Настройки</a>
            </nav>
        </div>
    </header>

    <div class="max-w-6xl mx-auto p-4">
        <div class="bg-white rounded-xl shadow-sm overflow-hidden" id="communityHeader">
            <div class="community-cover"></div>
            <div class="px-6 pb-6">
                <div class="flex items-end justify-between">
                    <div class="flex items-end space-x-4">
                        <div class="community-avatar w-28 h-28 bg-white rounded-2xl flex items-center justify-center shadow-lg" id="communityAvatar"><i class="fas fa-users text-5xl text-purple-600"></i></div>
                        <div class="mb-2"><h1 class="text-2xl font-bold" id="communityName">Загрузка...</h1><div class="flex items-center space-x-2 mt-1"><span id="communityStats" class="text-sm text-gray-500"></span></div></div>
                    </div>
                    <div class="flex space-x-2 mb-2">
                        <button id="joinBtn" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 hidden">Вступить</button>
                        <button id="leaveBtn" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 hidden">Выйти</button>
                    </div>
                </div>
                <p class="text-gray-600 mt-4" id="communityDescription"></p>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm mt-6">
            <div class="flex border-b px-6">
                <button class="tab py-3 px-4 text-gray-600 hover:text-blue-600 transition" data-tab="feed">Лента</button>
                <button class="tab py-3 px-4 text-gray-600 hover:text-blue-600 transition" data-tab="members">Участники</button>
                <button class="tab py-3 px-4 text-gray-600 hover:text-blue-600 transition" data-tab="about">О сообществе</button>
            </div>
            <div id="feedTab" class="p-6 tab-content"><div class="text-center py-8 text-gray-500">Загрузка...</div></div>
            <div id="membersTab" class="p-6 tab-content hidden"><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="membersContainer"></div></div>
            <div id="aboutTab" class="p-6 tab-content hidden"><div><h3 class="font-semibold">Описание</h3><p id="aboutDescription" class="text-gray-600 mt-1"></p><div class="mt-4"><h3 class="font-semibold">Информация</h3><p class="text-gray-600 mt-1"><span class="font-medium">Дата создания:</span> <span id="createdAt"></span></p><p class="text-gray-600"><span class="font-medium">Тип:</span> <span id="privacyType"></span></p></div></div></div>
        </div>
    </div>
    
    <div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg hidden transition-all z-50 bg-gray-800 text-white"></div>

    <script>
        const API_URL = '/api';
        const communityId = new URLSearchParams(location.search).get('id');
        let currentCommunity = null;
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('hidden');
            const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg transition-all z-50 ${colors[type]}`;
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
        
        async function loadCommunity() {
            try {
                const response = await fetch(`${API_URL}/communities/${communityId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                currentCommunity = data.community;
                
                document.getElementById('communityName').textContent = currentCommunity.name;
                document.getElementById('communityDescription').textContent = currentCommunity.description;
                document.getElementById('communityStats').textContent = `${currentCommunity.members_count} участников`;
                document.getElementById('createdAt').textContent = new Date(currentCommunity.created_at).toLocaleDateString();
                document.getElementById('privacyType').textContent = currentCommunity.is_private ? 'Закрытое' : 'Открытое';
                document.getElementById('aboutDescription').textContent = currentCommunity.description;
                
                if (currentCommunity.joined) {
                    document.getElementById('leaveBtn').classList.remove('hidden');
                } else {
                    document.getElementById('joinBtn').classList.remove('hidden');
                }
                
                await loadMembers();
                await loadFeed();
            } catch (error) {
                console.error('Failed to load community:', error);
                showToast('Ошибка загрузки сообщества', 'error');
            }
        }
        
        async function loadMembers() {
            try {
                const response = await fetch(`${API_URL}/communities/${communityId}/members`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                const container = document.getElementById('membersContainer');
                container.innerHTML = data.members.map(m => `
                    <div class="flex items-center space-x-3 p-3 border rounded-lg">
                        <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white font-bold">${m.user_name?.charAt(0) || 'U'}</div>
                        <div><a href="/profile.html?userId=${m.user_id}" class="font-semibold hover:underline">${m.user_name}</a><p class="text-xs text-gray-500">${m.role_display}</p></div>
                    </div>
                `).join('');
            } catch (error) { console.error(error); }
        }
        
        async function loadFeed() {
            try {
                const response = await fetch(`${API_URL}/feed?type=community&community_id=${communityId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                const container = document.getElementById('feedTab');
                if (!data.posts || data.posts.length === 0) {
                    container.innerHTML = '<div class="text-center py-8 text-gray-500">Нет постов</div>';
                    return;
                }
                container.innerHTML = data.posts.map(post => `
                    <div class="border rounded-xl p-4 mb-4">
                        <div class="flex items-center space-x-3 mb-3"><div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center"><i class="fas fa-user"></i></div><div><a href="/profile.html?userId=${post.author_id}" class="font-semibold hover:underline">${post.author_name}</a><p class="text-xs text-gray-400">${new Date(post.created_at).toLocaleString()}</p></div></div>
                        ${post.title ? `<h3 class="font-bold text-lg mb-2">${post.title}</h3>` : ''}<p class="text-gray-700">${post.content}</p>
                        ${post.image_url ? `<img src="${post.image_url}" class="mt-3 rounded-lg max-h-96 object-cover">` : ''}
                    </div>
                `).join('');
            } catch (error) { console.error(error); }
        }
        
        async function joinCommunity() {
            try {
                const response = await fetch(`${API_URL}/communities/${communityId}/join`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (response.ok) {
                    showToast('Вы вступили в сообщество!', 'success');
                    location.reload();
                } else {
                    const error = await response.json();
                    if ((error.error || '').includes('private')) {
                        const req = await fetch(`${API_URL}/communities/${communityId}/request`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                        });
                        if (req.ok) {
                            showToast('Заявка отправлена администратору', 'info');
                            return;
                        }
                    }
                    showToast(error.error || 'Ошибка', 'error');
                }
            } catch (error) { showToast('Ошибка соединения', 'error'); }
        }
        
        async function leaveCommunity() {
            if (!confirm('Вы уверены, что хотите покинуть сообщество?')) return;
            try {
                const response = await fetch(`${API_URL}/communities/${communityId}/leave`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (response.ok) {
                    showToast('Вы покинули сообщество', 'success');
                    window.location.href = '/dashboard.html';
                } else { showToast('Ошибка', 'error'); }
            } catch (error) { showToast('Ошибка соединения', 'error'); }
        }
        
        document.getElementById('joinBtn')?.addEventListener('click', joinCommunity);
        document.getElementById('leaveBtn')?.addEventListener('click', leaveCommunity);
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
                tab.classList.add('tab-active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(`${tab.dataset.tab}Tab`).classList.remove('hidden');
            });
        });
        
        loadCommunity();
    </script>
</body>
</html>
