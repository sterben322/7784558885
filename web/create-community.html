<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Создание сообщества</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full">
            <div class="p-6 border-b"><h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Создание сообщества</h1></div>
            <form id="createCommunityForm" class="p-6 space-y-4">
                <div><label class="block text-sm font-medium mb-1">Название *</label><input type="text" id="name" required class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium mb-1">Описание *</label><textarea id="description" rows="4" required class="w-full px-4 py-2 border rounded-lg"></textarea></div>
                <div><label class="block text-sm font-medium mb-1">Логотип (URL)</label><input type="url" id="logoUrl" class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="flex items-center space-x-2"><input type="checkbox" id="isPrivate"><span>Закрытое сообщество</span></label></div>
                <div class="flex justify-end space-x-3 pt-4"><button type="button" onclick="history.back()" class="px-4 py-2 border rounded-lg">Отмена</button><button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg">Создать</button></div>
            </form>
        </div>
    </div>
    <script>
        const API_URL = '/api';
        document.getElementById('createCommunityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                logo_url: document.getElementById('logoUrl').value || null,
                icon: 'fa-users',
                color: 'blue',
                search_tags: [],
                is_private: document.getElementById('isPrivate').checked
            };
            try {
                const response = await fetch(`${API_URL}/communities`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify(data)
                });
                if (response.ok) { alert('Сообщество создано!'); window.location.href = '/dashboard.html'; }
                else { const error = await response.json(); alert(error.error || 'Ошибка создания'); }
            } catch (error) { alert('Ошибка соединения'); }
        });
    </script>
</body>
</html>
