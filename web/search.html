<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Поиск</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-[#f6f8fa] text-[#273244]">
<header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
        <a href="/dashboard.html" class="font-bold text-lg">LASTOP</a>
        <a href="/dashboard.html" class="text-sm text-[#5d6978] hover:text-[#2b8662]">Вернуться в ленту</a>
    </div>
</header>
<main class="max-w-6xl mx-auto p-4 md:p-6">
    <section class="rounded-2xl border border-[#e4eaee] bg-white p-5 shadow-[0_10px_22px_rgba(178,190,198,0.10)]">
        <h1 class="text-2xl font-semibold text-[#2f3d4f]">Результаты поиска</h1>
        <p id="searchQueryText" class="mt-2 text-sm text-[#7f8b98]"></p>
        <div id="searchResults" class="mt-5 space-y-4"></div>
    </section>
</main>

<script>
(function () {
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.href = '/login.html';
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const query = (params.get('q') || '').trim();
  const queryText = document.getElementById('searchQueryText');
  const resultsEl = document.getElementById('searchResults');

  queryText.textContent = query ? `Запрос: «${query}»` : 'Введите запрос в строке поиска в верхнем баре.';

  function renderSection(title, items) {
    if (!Array.isArray(items) || !items.length) return '';
    return `
      <section class="rounded-xl border border-[#edf2f4] bg-[#fbfdfd] p-4">
        <h2 class="text-lg font-semibold text-[#334153]">${title}</h2>
        <div class="mt-3 space-y-2">
          ${items.map(item => `
            <a href="${item.route}" class="block rounded-lg border border-[#e7ecef] bg-white px-3 py-2 hover:bg-[#f4f8f7]">
              <div class="text-[15px] font-semibold text-[#2f3d4f]">${item.title}</div>
              ${item.subtitle ? `<div class="mt-1 text-xs text-[#7f8b98]">${item.subtitle}</div>` : ''}
            </a>
          `).join('')}
        </div>
      </section>
    `;
  }

  async function load() {
    if (!query || query.length < 2) {
      resultsEl.innerHTML = '<div class="rounded-xl border border-dashed border-[#d4dde3] bg-white p-6 text-sm text-[#7f8b98]">Для поиска введите минимум 2 символа.</div>';
      return;
    }

    resultsEl.innerHTML = '<div class="text-sm text-[#7f8b98]">Поиск...</div>';
    try {
      const response = await fetch(`/api/search/global?q=${encodeURIComponent(query)}&limit=20`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload.success) {
        throw new Error(payload.error || 'Ошибка поиска');
      }
      const data = payload.data || {};
      const html = [
        renderSection('Пользователи', data.users),
        renderSection('Компании', data.companies),
        renderSection('Разделы форума', data.forums),
        renderSection('Темы форума', data.topics),
        renderSection('Быстрый чат', data.chats),
        renderSection('Публикации', data.news),
      ].join('');

      resultsEl.innerHTML = html || '<div class="rounded-xl border border-dashed border-[#d4dde3] bg-white p-6 text-sm text-[#7f8b98]">Ничего не найдено.</div>';
    } catch (error) {
      resultsEl.innerHTML = `<div class="rounded-xl border border-[#f1d8d8] bg-[#fff8f8] p-6 text-sm text-[#9b3f3f]">${error.message}</div>`;
    }
  }

  load();
})();
</script>
</body>
</html>
