<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LASTOP | Чат</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <header class="bg-white border-b">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/dashboard.html" class="font-bold text-lg">LASTOP</a>
            <nav class="flex items-center gap-4 text-sm flex-wrap justify-end">
                <a href="/dashboard.html" class="text-gray-600 hover:text-black">Главная</a>
                <a href="/dashboard.html#communities" class="text-gray-600 hover:text-black">Сообщества</a>
                <a href="/company.html" class="text-gray-600 hover:text-black">Компании</a>
                <a href="/jobs.html" class="text-gray-600 hover:text-black">Резюме и вакансии</a>
                <a href="/forum.html" class="text-gray-600 hover:text-black">Форум</a>
                <a href="/chat.html" class="text-gray-600 hover:text-black">Чат</a>
                <a href="/settings.html" class="text-gray-600 hover:text-black">Настройки</a>
            </nav>
        </div>
    </header>
    <div class="max-w-4xl mx-auto p-8">
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h1 class="text-2xl font-bold mb-6">Чаты</h1>
            <div class="space-y-4" id="chatsList"><div class="text-center py-8 text-gray-500">Загрузка...</div></div>
        </div>
    </div>
    <script>
        const API_URL = '/api';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        async function loadChats() {
            try {
                const response = await fetch(`${API_URL}/chats`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                const chats = data.chats || [];
                document.getElementById('chatsList').innerHTML = chats.map(c => `<div class="border rounded-lg p-4 flex justify-between items-center"><div><h3 class="font-semibold">${c.name || 'Диалог'}</h3>${c.last_message ? `<p class="text-sm text-gray-500">${c.last_message}</p>` : ''}</div>${c.unread_count > 0 ? `<span class="bg-red-500 text-white px-2 py-1 rounded-full text-xs">${c.unread_count}</span>` : ''}</div>`).join('') || '<div class="text-center py-8 text-gray-500">Чатов пока нет</div>';
            } catch (e) {
                document.getElementById('chatsList').innerHTML = '<div class="text-center py-8 text-red-500">Ошибка загрузки</div>';
            }
        }
        loadChats();
    </script>
</body>
</html>
