<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Чаты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-[#f6f8fa] text-[#273244]">
<header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="/dashboard.html" class="font-bold text-lg">LASTOP</a>
        <nav class="flex items-center gap-4 text-sm flex-wrap justify-end">
            <a href="/dashboard.html" class="text-gray-600 hover:text-black">Главная</a>
            <a href="/profile.html" class="text-gray-600 hover:text-black">Профиль</a>
            <a href="/chat.html" class="font-semibold text-[#2b8662]">Чаты</a>
        </nav>
    </div>
</header>

<div class="max-w-6xl mx-auto p-4 md:p-6">
    <div id="chatMessage" class="hidden mb-4 rounded-xl px-3 py-2 text-sm"></div>
    <div class="grid gap-4 md:grid-cols-[340px_minmax(0,1fr)]">
        <aside class="rounded-2xl border border-[#e4eaee] bg-white p-4 space-y-4">
            <h2 class="text-lg font-semibold">Чаты</h2>

            <div class="rounded-xl border border-[#edf2f4] p-3 space-y-2">
                <div class="text-sm font-semibold">Новый чат с пользователем</div>
                <input id="usersSearch" type="text" class="w-full rounded-lg border border-[#dbe4e8] px-2 py-2 text-sm" placeholder="Имя или email">
                <select id="usersSelect" class="w-full rounded-lg border border-[#dbe4e8] px-2 py-2 text-sm">
                    <option value="">Выберите пользователя</option>
                </select>
                <button id="startChatBtn" class="w-full rounded-lg bg-[#2b8662] px-3 py-2 text-sm font-semibold text-white hover:bg-[#246f52] disabled:opacity-60 disabled:cursor-not-allowed">
                    Написать
                </button>
            </div>

            <div id="chatsList" class="space-y-2"></div>
            <p id="chatsEmpty" class="hidden text-sm text-[#8a97a5]">Диалогов пока нет.</p>
        </aside>

        <section class="rounded-2xl border border-[#e4eaee] bg-white p-4 flex flex-col min-h-[560px]">
            <div id="chatHeader" class="border-b border-[#edf2f4] pb-3 mb-3 text-lg font-semibold">Выберите диалог</div>
            <div id="messagesList" class="flex-1 overflow-auto space-y-2 pr-1">
                <div class="text-sm text-[#8a97a5]">Сообщения появятся здесь после выбора чата.</div>
            </div>
            <form id="messageForm" class="mt-3 border-t border-[#edf2f4] pt-3 flex gap-2">
                <input id="messageInput" type="text" placeholder="Введите сообщение" class="flex-1 rounded-lg border border-[#dbe4e8] px-3 py-2 text-sm" disabled>
                <button id="sendBtn" type="submit" class="rounded-lg bg-[#2b8662] px-4 py-2 text-sm font-semibold text-white hover:bg-[#246f52] disabled:opacity-60" disabled>
                    Отправить
                </button>
            </form>
        </section>
    </div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/login.html';

const state = {
    conversations: [],
    users: [],
    activeConversationId: null,
    sending: false,
};

function setMessage(text, ok = true) {
    const el = document.getElementById('chatMessage');
    el.textContent = text;
    el.className = `mb-4 rounded-xl px-3 py-2 text-sm ${ok ? 'bg-[#e9f7ef] text-[#2a7d5b]' : 'bg-[#fdeeee] text-[#b94242]'}`;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 3200);
}

async function api(path, options = {}) {
    const response = await fetch(path, {
        ...options,
        headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
            ...(options.headers || {})
        }
    });
    const payload = await response.json().catch(() => ({}));
    if (!response.ok) {
        throw new Error(payload.message || payload.error || 'Ошибка запроса');
    }
    return payload;
}

function formatTime(value) {
    if (!value) return '';
    const dt = new Date(value);
    if (Number.isNaN(dt.getTime())) return '';
    return dt.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function renderChats() {
    const list = document.getElementById('chatsList');
    const empty = document.getElementById('chatsEmpty');
    if (!state.conversations.length) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
    }
    empty.classList.add('hidden');
    list.innerHTML = state.conversations.map(c => {
        const active = c.id === state.activeConversationId;
        const peerLink = c.peer_user_id ? `<a href="/profile.html?userId=${c.peer_user_id}" class="text-xs text-[#6a7988] hover:underline">Профиль</a>` : '';
        return `
        <button data-open-chat="${c.id}" class="w-full text-left rounded-xl border px-3 py-2 ${active ? 'border-[#2b8662] bg-[#eff7f3]' : 'border-[#edf2f4] hover:bg-[#f8fbfb]'}">
            <div class="flex items-center justify-between gap-2">
                <div class="font-semibold text-sm truncate">${c.name || 'Диалог'}</div>
                ${c.unread_count > 0 ? `<span class="rounded-full bg-[#dd4d4d] px-2 py-0.5 text-xs font-semibold text-white">${c.unread_count}</span>` : ''}
            </div>
            <div class="mt-1 text-xs text-[#8a97a5] truncate">${c.last_message || 'Пока нет сообщений'}</div>
            <div class="mt-1 flex items-center justify-between text-[11px] text-[#9aa7b5]"><span>${formatTime(c.last_time)}</span>${peerLink}</div>
        </button>`;
    }).join('');
}

function renderUsersSelect() {
    const select = document.getElementById('usersSelect');
    const options = ['<option value="">Выберите пользователя</option>']
        .concat(state.users.map(u => `<option value="${u.id}">${u.full_name}${u.is_private_profile ? ' 🔒' : ''}</option>`));
    select.innerHTML = options.join('');
}

async function loadConversations() {
    const data = await api('/api/chat/conversations');
    state.conversations = data.conversations || [];
    renderChats();
}

async function loadUsers(search = '') {
    const data = await api(`/api/users?q=${encodeURIComponent(search.trim())}`);
    state.users = data.users || [];
    renderUsersSelect();
}

function renderMessages(messages) {
    const list = document.getElementById('messagesList');
    if (!messages.length) {
        list.innerHTML = '<div class="text-sm text-[#8a97a5]">Пока нет сообщений. Напишите первое сообщение.</div>';
        return;
    }
    list.innerHTML = messages.map(m => `
        <div class="rounded-xl border border-[#edf2f4] px-3 py-2">
            <div class="flex items-center justify-between gap-2">
                <div class="text-sm font-semibold">${m.sender_name || 'Пользователь'}</div>
                <div class="text-xs text-[#95a1ad]">${formatTime(m.created_at)}</div>
            </div>
            <div class="mt-1 text-sm">${m.content}</div>
        </div>
    `).join('');
    list.scrollTop = list.scrollHeight;
}

async function openConversation(id) {
    state.activeConversationId = id;
    renderChats();
    document.getElementById('messageInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;

    const details = await api(`/api/chat/conversations/${id}`);
    document.getElementById('chatHeader').textContent = details.conversation?.name || 'Диалог';

    const data = await api(`/api/chat/conversations/${id}/messages`);
    renderMessages(data.messages || []);
    await loadConversations();
}

async function startConversationWithUser(userId) {
    const data = await api(`/api/chat/conversations/start/${userId}`, { method: 'POST' });
    const conversationId = data.conversation?.id;
    if (!conversationId) throw new Error('Не удалось создать чат');
    await loadConversations();
    await openConversation(conversationId);
}

async function onSendMessage(event) {
    event.preventDefault();
    if (!state.activeConversationId || state.sending) return;
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content) return;

    state.sending = true;
    document.getElementById('sendBtn').disabled = true;
    try {
        await api(`/api/chat/conversations/${state.activeConversationId}/messages`, {
            method: 'POST',
            body: JSON.stringify({ content })
        });
        input.value = '';
        const data = await api(`/api/chat/conversations/${state.activeConversationId}/messages`);
        renderMessages(data.messages || []);
        await loadConversations();
    } finally {
        state.sending = false;
        document.getElementById('sendBtn').disabled = false;
    }
}

function bindEvents() {
    document.getElementById('chatsList').addEventListener('click', async (event) => {
        const btn = event.target.closest('[data-open-chat]');
        if (!btn) return;
        try {
            await openConversation(btn.dataset.openChat);
        } catch (e) {
            setMessage(e.message, false);
        }
    });

    document.getElementById('startChatBtn').addEventListener('click', async () => {
        const userId = document.getElementById('usersSelect').value;
        if (!userId) {
            setMessage('Сначала выберите пользователя', false);
            return;
        }
        const btn = document.getElementById('startChatBtn');
        btn.disabled = true;
        try {
            await startConversationWithUser(userId);
        } catch (e) {
            setMessage(e.message, false);
        } finally {
            btn.disabled = false;
        }
    });

    document.getElementById('usersSearch').addEventListener('input', async (event) => {
        try {
            await loadUsers(event.target.value || '');
        } catch (e) {
            setMessage(e.message, false);
        }
    });

    document.getElementById('messageForm').addEventListener('submit', async (event) => {
        try {
            await onSendMessage(event);
        } catch (e) {
            setMessage(e.message, false);
        }
    });
}

(async function init() {
    try {
        bindEvents();
        await Promise.all([loadConversations(), loadUsers()]);
        const params = new URLSearchParams(window.location.search);
        const initialConversation = params.get('conversation');
        const userId = params.get('userId');
        if (userId) {
            await startConversationWithUser(userId);
            return;
        }
        if (initialConversation) {
            await openConversation(initialConversation);
        }
    } catch (e) {
        setMessage(e.message, false);
    }
})();
</script>
</body>
</html>
