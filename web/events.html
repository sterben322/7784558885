<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LASTOP GROUP — Мероприятия</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1E8A4C;--gm:#22A05A;--gl:#E8F5EE;--gp:#F0FAF4;--gmt:#5A8A6A;--gb:#C0DECA;
  --w:#FFF;--bg:#F2F5F3;--t:#1A2A22;--tm:#3A5245;--bdr:#DDE8E2;
  --red:#E04040;--blue:#185FA5;--blue-l:#E6F1FB;--blue-b:#85B7EB;
  --r:8px;--rm:12px;--rl:18px;--rxl:24px;
  --sh:0 2px 12px rgba(30,138,76,.07);--shm:0 6px 24px rgba(30,138,76,.13)
}
html,body{height:100%;overflow:hidden;font-family:'Manrope',sans-serif;background:var(--bg);color:var(--t);font-size:14px}
.shell{display:grid;grid-template-columns:220px 1fr 264px;grid-template-rows:56px 1fr;grid-template-areas:"logo topbar topbar""nav main right";height:100vh;gap:10px;padding:10px}

/* ── LOGO ── */
.logo-cell{grid-area:logo;background:var(--w);border-radius:var(--rl);border:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;gap:10px;text-decoration:none;box-shadow:var(--sh);transition:box-shadow .2s;overflow:hidden}
.logo-cell:hover{box-shadow:var(--shm)}
.logo-cell img{height:34px;width:auto;object-fit:contain;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1.15}
.logo-text .lt1{font-size:13px;font-weight:800;color:var(--g);letter-spacing:.04em}
.logo-text .lt2{font-size:9px;font-weight:600;color:var(--gmt);letter-spacing:.12em;text-transform:uppercase}

/* ── TOPBAR ── */
.topbar{grid-area:topbar;background:var(--w);border-radius:var(--rl);border:1px solid var(--bdr);display:flex;align-items:center;gap:10px;padding:0 14px;box-shadow:var(--sh)}
.search-wrap{flex:1;position:relative;display:flex;align-items:center}
.search-wrap svg{position:absolute;left:11px;color:var(--gmt);pointer-events:none;width:15px;height:15px}
.search-wrap input{width:100%;height:34px;padding:0 12px 0 34px;border:1.5px solid var(--bdr);border-radius:var(--rm);background:var(--gp);font-family:inherit;font-size:13px;color:var(--t);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--gm)}
.search-wrap input::placeholder{color:var(--gmt)}
.icon-btn{position:relative;width:36px;height:36px;border-radius:var(--rm);border:1.5px solid var(--bdr);background:var(--gp);display:grid;place-items:center;cursor:pointer;color:var(--g);transition:background .15s,border-color .15s;flex-shrink:0}
.icon-btn:hover{background:var(--gl);border-color:var(--gb)}
.icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:99px;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--w)}
.br{background:var(--red)}.bgg{background:var(--g)}

/* ── NAV ── */
.nav{grid-area:nav;background:var(--w);border-radius:var(--rxl);border:1px solid var(--bdr);box-shadow:var(--sh);overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;padding:10px 8px;gap:2px}
.nav::-webkit-scrollbar{display:none}
.nav-div{height:1px;background:var(--bdr);margin:6px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;text-decoration:none;color:var(--tm);font-size:13px;font-weight:500;transition:background .15s,color .15s;white-space:nowrap}
.nav-item:hover{background:var(--gp);color:var(--g)}
.nav-item.active{background:var(--g);color:#fff;font-weight:600}
.nav-item.active svg *{stroke:#fff}
.nav-item svg{width:18px;height:18px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

/* ── LAYOUT ── */
.main{grid-area:main;overflow:hidden;display:flex;flex-direction:column;gap:10px}
.right{grid-area:right;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.right::-webkit-scrollbar{display:none}
.card{background:var(--w);border:1px solid var(--bdr);border-radius:var(--rxl);padding:14px;box-shadow:var(--sh)}
.block-title{font-size:11px;font-weight:700;color:var(--gmt);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}

/* ── TOOLBAR ── */
.toolbar{background:var(--w);border:1px solid var(--bdr);border-radius:var(--rxl);display:flex;align-items:center;gap:6px;padding:10px 14px;flex-shrink:0;box-shadow:var(--sh);flex-wrap:wrap}
.toolbar-sep{width:1px;height:20px;background:var(--bdr);flex-shrink:0;margin:0 2px}
.ftab{padding:5px 12px;border-radius:var(--rm);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:transparent;color:var(--tm);font-family:inherit;transition:all .15s;white-space:nowrap}
.ftab:hover{background:var(--gp);color:var(--g);border-color:var(--gb)}
.ftab.active{background:var(--g);color:#fff;border-color:var(--g)}
.btn-create{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--rm);background:var(--g);border:none;cursor:pointer;color:#fff;font-family:inherit;font-size:12px;font-weight:600;transition:background .15s;white-space:nowrap;flex-shrink:0;margin-left:auto}
.btn-create:hover{background:var(--gm)}
.btn-create svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round}

/* ── DATE BAR ── */
.date-bar{display:flex;align-items:center;gap:10px;flex-shrink:0;padding:0 2px}
.date-label{font-size:15px;font-weight:800;color:var(--t)}
.date-pill{background:var(--gl);color:var(--g);font-size:11px;font-weight:700;padding:3px 11px;border-radius:99px}
.date-today-btn{font-size:11px;font-weight:600;color:var(--gmt);padding:4px 12px;border-radius:99px;border:1.5px solid var(--bdr);background:var(--w);cursor:pointer;margin-left:auto;font-family:inherit;transition:all .15s}
.date-today-btn:hover{border-color:var(--gb);color:var(--g);background:var(--gp)}

/* ── FEED ── */
.feed{overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:2px}
.feed::-webkit-scrollbar{width:4px}
.feed::-webkit-scrollbar-thumb{background:var(--gb);border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── EVENT CARD ── */
.ev-card{background:var(--w);border:1px solid var(--bdr);border-radius:var(--rxl);overflow:hidden;display:grid;grid-template-columns:200px 1fr;cursor:pointer;box-shadow:var(--sh);transition:box-shadow .2s,transform .2s;animation:fadeUp .3s ease both}
.ev-card:hover{box-shadow:var(--shm);transform:translateY(-1px)}

.ev-cover{position:relative;min-height:168px;display:flex;align-items:flex-end;padding:10px;overflow:hidden}
.ev-cover.grad-blue{background:linear-gradient(135deg,#85B7EB 0%,#0C447C 100%)}
.ev-cover.grad-green{background:linear-gradient(135deg,#5DCAA5 0%,#085041 100%)}
.ev-cover.grad-purple{background:linear-gradient(135deg,#AFA9EC 0%,#3C3489 100%)}
.ev-cover.grad-amber{background:linear-gradient(135deg,#FAC775 0%,#854F0B 100%)}
.ev-cover.grad-coral{background:linear-gradient(135deg,#F5C4B3 0%,#712B13 100%)}
.ev-cover.grad-gray{background:linear-gradient(135deg,#B4B2A9 0%,#444441 100%)}
.ev-cover-img{position:absolute;inset:0;background-size:cover;background-position:center}
.ev-cover-ovr{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 30%,rgba(0,0,0,.58) 100%)}
.ev-time-chip{position:relative;z-index:2;background:rgba(255,255,255,.95);border-radius:10px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--t);display:inline-flex;align-items:center;gap:5px}
.ev-time-chip svg{width:11px;height:11px;fill:none;stroke:var(--g);stroke-width:2;stroke-linecap:round;flex-shrink:0}
.ev-fmt-bdg{position:absolute;top:10px;left:10px;z-index:2;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:5px}
.bdg-online{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b)}
.bdg-online-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);display:inline-block;flex-shrink:0}
.bdg-offline{background:#F0E6FB;color:#5E2C8C;border:1px solid #C9ABE8}
.ev-fmt-bdg svg{width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}

.ev-body{padding:13px 15px;display:flex;flex-direction:column;min-width:0}
.ev-cat{font-size:10px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.ev-title{font-size:14px;font-weight:800;color:var(--t);line-height:1.3;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ev-org{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gmt);margin-bottom:8px}
.ev-org-av{width:16px;height:16px;border-radius:4px;color:#fff;font-size:8px;font-weight:700;display:grid;place-items:center;flex-shrink:0}

.ev-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.pill svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.p-time{background:var(--blue-l);color:var(--blue)}
.p-dur{background:var(--gp);color:#27500A;border:1px solid var(--gb)}
.p-free{background:var(--gl);color:var(--g)}
.p-fee{background:#FAEEDA;color:#633806}
.p-seats{background:#F0E6FB;color:#5E2C8C}
.p-city{background:#F1EFE8;color:#444441;border:1px solid #D3D1C7}
.p-full{background:#FDECEC;color:#A32D2D;border:1px solid #F7C1C1}

.ev-desc{font-size:12px;color:var(--tm);line-height:1.55;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ev-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{padding:2px 9px;border-radius:99px;background:var(--gp);color:var(--tm);font-size:10px;font-weight:600;border:1px solid var(--bdr)}

.ev-foot{margin-top:auto;display:flex;align-items:center;gap:8px;padding-top:9px;border-top:1px solid var(--bdr)}
.ev-stat{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--gmt)}
.ev-stat svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round}
.ev-btns{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.btn-more{padding:6px 14px;border-radius:var(--rm);background:var(--gl);border:1px solid var(--gb);color:var(--g);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-more:hover{background:var(--gb)}
.btn-reg{padding:6px 14px;border-radius:var(--rm);background:var(--g);border:none;color:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-reg:hover{background:var(--gm)}
.btn-reg.registered{background:var(--gl);color:var(--g);border:1px solid var(--gb)}
.btn-reg.full{background:#F1EFE8;color:#888780;border:1px solid #D3D1C7;cursor:not-allowed}

/* ── MINI CALENDAR (right sidebar) ── */
.mini-cal-wrap{padding:0}
.mc-inner{padding:14px}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mc-month{font-size:13px;font-weight:800;color:var(--t)}
.mc-navs{display:flex;gap:4px}
.mc-btn{width:26px;height:26px;border-radius:var(--r);border:1.5px solid var(--bdr);background:var(--gp);display:grid;place-items:center;cursor:pointer;color:var(--g);transition:all .15s;flex-shrink:0}
.mc-btn:hover{background:var(--gl);border-color:var(--gb)}
.mc-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mc-dow{text-align:center;font-size:9px;font-weight:700;color:var(--gmt);padding:3px 0;letter-spacing:.04em;text-transform:uppercase;user-select:none}
.mc-day{position:relative;height:28px;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:600;color:var(--tm);transition:background .12s;user-select:none;gap:1px}
.mc-day:hover:not(.mc-empty){background:var(--gp)}
.mc-day.mc-today{background:var(--g);color:#fff;font-weight:700}
.mc-day.mc-today .mc-dots .mc-dot{background:rgba(255,255,255,.8)}
.mc-day.mc-selected{background:var(--gl);color:var(--g);border:1.5px solid var(--g);font-weight:700}
.mc-day.mc-selected.mc-today{background:var(--g);color:#fff;border:2px solid #fff}
.mc-day.mc-other{color:var(--gb);font-weight:400}
.mc-day.mc-other:hover{background:transparent;cursor:default}
.mc-day.mc-empty{cursor:default}
.mc-day-num{line-height:1;font-size:12px}
.mc-dots{display:flex;gap:2px;height:4px;align-items:center}
.mc-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.mc-dot-online{background:var(--blue)}
.mc-dot-offline{background:var(--red)}
.mc-dot-mine{background:#639922}
.mc-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)}
.mc-leg{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--gmt)}
.mc-leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── SIDEBAR ELEMENTS ── */
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr)}
.stat-row:last-child{border-bottom:none;padding-bottom:0}
.stat-lbl{font-size:12px;color:var(--gmt)}
.stat-val{font-size:13px;font-weight:700;color:var(--t)}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:var(--rm);cursor:pointer;transition:background .15s}
.cat-item:hover{background:var(--gp)}
.cat-name{font-size:12px;color:var(--t);font-weight:500;display:flex;align-items:center;gap:7px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-cnt{font-size:11px;color:var(--gmt)}
.my-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--rm);cursor:pointer;transition:background .15s}
.my-item:hover{background:var(--gp)}
.my-logo{width:28px;height:28px;border-radius:var(--r);font-size:11px;font-weight:700;color:#fff;display:grid;place-items:center;flex-shrink:0}
.my-name{font-size:12px;font-weight:600;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.my-sub{font-size:10px;color:var(--gmt);margin-top:1px}
.my-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0}
.dot-today{background:#22CC66;box-shadow:0 0 0 3px rgba(34,204,102,.2)}
.dot-soon{background:#FAC775}
.pop-item{display:flex;gap:8px;align-items:flex-start;padding:7px 8px;border-radius:var(--rm);cursor:pointer;transition:background .15s}
.pop-item:hover{background:var(--gp)}
.pop-num{width:20px;height:20px;border-radius:6px;background:var(--g);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center;flex-shrink:0;margin-top:1px}
.pop-ttl{font-size:12px;font-weight:600;color:var(--t);line-height:1.3}
.pop-sub{font-size:10px;color:var(--gmt);margin-top:2px}
.empty-block{text-align:center;padding:16px 8px;color:var(--gmt)}
.empty-block svg{width:28px;height:28px;fill:none;stroke:var(--gb);stroke-width:1.4;stroke-linecap:round;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto}
.empty-block p{font-size:12px;line-height:1.5}

/* ── AD ── */
.ad-block{background:#F8F5FF;border:1px solid #DDD0F0;border-radius:var(--rxl);padding:14px;position:relative;overflow:hidden}
.ad-label{position:absolute;top:10px;left:10px;background:#EAE0FA;color:#8060C0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:6px}
.ad-content{margin-top:20px;text-align:center}
.ad-title{font-size:13px;font-weight:700;color:#5040A0}
.ad-sub{font-size:11px;color:#7060B0;margin-top:3px}
.ad-btn{display:block;margin:10px auto 0;padding:7px 20px;border-radius:var(--rm);background:#7060B0;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s}
.ad-btn:hover{opacity:.88}

/* ── SKELETON ── */
.skeleton{background:var(--w);border:1px solid var(--bdr);border-radius:var(--rxl);overflow:hidden;display:grid;grid-template-columns:200px 1fr}
.sl{background:var(--bg);border-radius:var(--r);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,25,18,.45);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--w);border-radius:var(--rxl);border:1px solid var(--bdr);box-shadow:0 24px 60px rgba(30,138,76,.15);padding:24px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;transform:translateY(14px);transition:transform .22s}
.modal-bg.open .modal{transform:translateY(0)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--gb);border-radius:99px}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;position:sticky;top:-24px;background:var(--w);z-index:1}
.modal-head h3{font-size:16px;font-weight:800;color:var(--t)}
.modal-x{width:30px;height:30px;border-radius:var(--r);background:var(--gp);border:none;cursor:pointer;display:grid;place-items:center;color:var(--gmt);transition:background .15s}
.modal-x:hover{background:var(--gl);color:var(--g)}
.modal-x svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--gmt);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:5px}
.form-input{width:100%;border:1.5px solid var(--bdr);border-radius:var(--rm);padding:9px 12px;font-family:inherit;font-size:13px;color:var(--t);outline:none;transition:border-color .2s;background:var(--gp)}
.form-input:focus{border-color:var(--gm)}
.form-input::placeholder{color:var(--gmt)}
textarea.form-input{resize:none;height:90px;line-height:1.55}
select.form-input{cursor:pointer;-webkit-appearance:none;appearance:none}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-section{font-size:11px;font-weight:700;color:var(--gmt);letter-spacing:.06em;text-transform:uppercase;padding:8px 0 4px;border-top:1px solid var(--bdr);margin-bottom:8px;margin-top:4px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--bdr)}
.btn-sec{padding:8px 18px;border-radius:var(--rm);border:1.5px solid var(--bdr);background:var(--w);font-family:inherit;font-size:13px;font-weight:600;color:var(--tm);cursor:pointer;transition:background .15s}
.btn-sec:hover{background:var(--gp)}
.btn-pri{padding:8px 22px;border-radius:var(--rm);border:none;background:var(--g);font-family:inherit;font-size:13px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s}
.btn-pri:hover{opacity:.88}
.btn-pri:disabled{background:var(--gb);cursor:not-allowed}

/* cover upload */
.cover-upload{aspect-ratio:16/7;border-radius:var(--rm);border:1.5px dashed var(--bdr);background:var(--gp);display:grid;place-items:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s,background .15s}
.cover-upload:hover{border-color:var(--g);background:var(--gl)}
.cover-upload img{width:100%;height:100%;object-fit:cover;display:block}
.cover-upload .cu-hint{color:var(--gmt);font-size:12px;text-align:center;padding:10px}
.cover-upload .cu-hint svg{width:22px;height:22px;display:block;margin:0 auto 6px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round}
.cover-upload .rm-cover{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:grid;place-items:center;border:none;cursor:pointer;z-index:2}
.cover-upload .rm-cover svg{width:12px;height:12px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round}

/* ── DETAIL PANEL ── */
.detail-panel{position:fixed;top:0;right:-540px;width:540px;max-width:92vw;height:100vh;background:var(--w);border-left:1px solid var(--bdr);box-shadow:-4px 0 30px rgba(30,138,76,.08);z-index:150;transition:right .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
.detail-panel.open{right:0}
.detail-panel::-webkit-scrollbar{width:4px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--gb);border-radius:99px}
.dp-close{position:sticky;top:0;background:var(--w);padding:12px 16px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;z-index:1}
.dp-close-btn{width:30px;height:30px;border-radius:var(--r);background:var(--gp);border:none;cursor:pointer;display:grid;place-items:center;color:var(--gmt);flex-shrink:0}
.dp-close-btn:hover{background:var(--gl);color:var(--g)}
.dp-close-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.dp-close span{font-size:13px;font-weight:700;color:var(--t)}
.dp-hero{position:relative;aspect-ratio:16/8;overflow:hidden}
.dp-hero-img{position:absolute;inset:0;background-size:cover;background-position:center}
.dp-hero-ovr{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 35%,rgba(0,0,0,.68) 100%)}
.dp-hero-content{position:absolute;left:16px;right:16px;bottom:14px;color:#fff;z-index:2}
.dp-hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;margin-bottom:8px;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.35)}
.dp-hero-title{font-size:20px;font-weight:800;line-height:1.2;margin-bottom:4px}
.dp-hero-cat{font-size:11px;color:rgba(255,255,255,.85);letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.dp-body{padding:16px;flex:1}
.dp-section{font-size:11px;font-weight:700;color:var(--gmt);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bdr);margin-top:14px}
.dp-section:first-child{margin-top:0}
.dp-org-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dp-org-av{width:36px;height:36px;border-radius:var(--rm);color:#fff;font-size:14px;font-weight:800;display:grid;place-items:center;flex-shrink:0}
.dp-org-name{font-size:13px;font-weight:700;color:var(--t)}
.dp-org-role{font-size:11px;color:var(--gmt);margin-top:2px}
.dp-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.dp-text{font-size:13px;color:var(--tm);line-height:1.65;margin-bottom:12px;white-space:pre-wrap}
.dp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.dp-speakers{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.dp-speaker{display:flex;align-items:center;gap:10px}
.dp-sp-av{width:32px;height:32px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:grid;place-items:center;flex-shrink:0}
.dp-sp-name{font-size:13px;font-weight:600;color:var(--t)}
.dp-sp-role{font-size:11px;color:var(--gmt);margin-top:1px}
.dp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.dp-stat-card{background:var(--gp);border-radius:var(--rm);border:1px solid var(--bdr);padding:10px;text-align:center}
.dp-stat-val{font-size:18px;font-weight:800;color:var(--g)}
.dp-stat-lbl{font-size:10px;color:var(--gmt);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.dp-actions{display:flex;gap:8px;padding:14px 16px;border-top:1px solid var(--bdr);position:sticky;bottom:0;background:var(--w)}
.dp-btn-pri{flex:1;padding:10px;border-radius:var(--rm);background:var(--g);color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.dp-btn-pri:hover{background:var(--gm)}
.dp-btn-pri.registered{background:var(--gl);color:var(--g);border:1px solid var(--gb)}
.dp-btn-pri.full{background:#F1EFE8;color:#888780;border:1px solid #D3D1C7;cursor:not-allowed}
.dp-btn-sec{padding:10px 16px;border-radius:var(--rm);border:1.5px solid var(--bdr);background:var(--w);font-family:inherit;font-size:13px;font-weight:600;color:var(--tm);cursor:pointer;transition:background .15s}
.dp-btn-sec:hover{background:var(--gp)}
.panel-overlay{position:fixed;inset:0;z-index:140;background:rgba(15,25,18,.25);display:none}
.panel-overlay.show{display:block}

@media(max-width:1200px){.shell{grid-template-columns:220px 1fr 240px}}

<script>
const API='/api', tk=()=>localStorage.getItem('token');
const COLORS=['#5AB080','#3A90C0','#9060C0','#C07030','#E04040','#1A8A6A','#B05090','#208090','#C04030','#3B6D11'];
const MONTHS_RU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_GEN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const DOW_FULL=['понедельник','вторник','среда','четверг','пятница','суббота','воскресенье'];
const GRADS=['grad-blue','grad-green','grad-purple','grad-amber','grad-coral','grad-gray'];
const TYPE_LABELS={webinar:'Вебинар',workshop:'Воркшоп',conference:'Конференция',networking:'Нетворкинг',roundtable:'Круглый стол'};
const CAT_COLORS={webinar:'#378ADD',workshop:'#1E8A4C',conference:'#854F0B',networking:'#3C3489',roundtable:'#5A8A6A'};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escA(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function avc(s){return COLORS[(s||'').charCodeAt(0)%COLORS.length]||COLORS[0];}
function grad(s){return GRADS[(s||'').charCodeAt(0)%GRADS.length];}
function letter(s){return((s||'?')[0]).toUpperCase();}
function num(n){return n>=1000?(n/1000).toFixed(1).replace(/\.0$/,'')+'к':String(n);}

today.setHours(0,0,0,0);

/* ──────────────────────────────────────────────
   DATE HELPERS
──────────────────────────────────────────────── */
function dateKey(d){ return d.toISOString().split('T')[0]; }
function parseDate(s){ const p=s?s.split('-').map(Number):[]; return p.length===3?new Date(p[0],p[1]-1,p[2]):null; }
function isSameDay(a,b){ return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function formatDisplayDate(d){
  if(!d) return '';
  const dow=DOW_FULL[(d.getDay()+6)%7];
  return `${d.getDate()} ${MONTHS_GEN[d.getMonth()]} ${d.getFullYear()} — ${dow}`;
}

async function loadAllEvents(){
  try{
    const r=await fetch(`${API}/events?limit=200`,{headers:{Authorization:'Bearer '+tk()}});
    if(!r.ok) throw 0;
    const data=await r.json();
    indexEvents(Array.isArray(data.events)?data.events:[]);
  }catch{
    indexEvents(demoEvents());
  }
  renderCalendar();
  renderFeed();
  renderPopular();
}

function indexEvents(list){
  eventsByDate={};
  eventStore.clear();
  list.forEach(ev=>{
    if(!ev.date) return;
    const k=ev.date.split('T')[0];
    if(!eventsByDate[k]) eventsByDate[k]=[];
    eventsByDate[k].push(ev);
    eventStore.set(String(ev.id),ev);
  });
}

/* ══════════════════════════════════════════════════
   MINI CALENDAR
══════════════════════════════════════════════════ */
function renderCalendar(){
  document.getElementById('mcMonthLabel').textContent=`${MONTHS_RU[calMonth]} ${calYear}`;
  const grid=document.getElementById('mcGrid');
  grid.innerHTML='';

  // day-of-week headers
  ['пн','вт','ср','чт','пт','сб','вс'].forEach(d=>{
    const el=document.createElement('div');
    el.className='mc-dow'; el.textContent=d;
    grid.appendChild(el);
  });

  // first day of month (monday-based)
  const firstDay=new Date(calYear,calMonth,1);
  const startOffset=(firstDay.getDay()+6)%7; // Mon=0
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();

  // previous month tail
  for(let i=startOffset-1;i>=0;i--){
    const el=document.createElement('div');
    el.className='mc-day mc-other';
    el.textContent=String(prevDays-i);
    grid.appendChild(el);
  }

  // current month
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(calYear,calMonth,d);
    const key=dateKey(date);
    const evs=eventsByDate[key]||[];
    const isToday=isSameDay(date,today);
    const isSel=isSameDay(date,selDate);

    const el=document.createElement('div');
    let cls='mc-day';
    if(isToday) cls+=' mc-today';
    if(isSel&&!isToday) cls+=' mc-selected';
    if(isSel&&isToday) cls+=' mc-today mc-selected';
    el.className=cls;

    const numEl=document.createElement('div');
    numEl.className='mc-day-num'; numEl.textContent=String(d);
    el.appendChild(numEl);

    // dots: max 3, priority: mine > offline > online
    if(evs.length){
      const dots=document.createElement('div');
      dots.className='mc-dots';
      const hasMine=evs.some(e=>e.is_registered);
      const hasOffline=evs.some(e=>e.format==='offline'||e.format==='hybrid');
      const hasOnline=evs.some(e=>e.format==='online');
      const toShow=[];
      if(hasMine) toShow.push('mc-dot-mine');
      if(hasOffline&&toShow.length<3) toShow.push('mc-dot-offline');
      if(hasOnline&&toShow.length<3) toShow.push('mc-dot-online');
      toShow.forEach(cls=>{
        const dot=document.createElement('div');
        dot.className='mc-dot '+cls;
        dots.appendChild(dot);
      });
      el.appendChild(dots);
    }

    el.addEventListener('click',()=>selectDate(date));
    grid.appendChild(el);
  }

  // next month head
  const totalCells=startOffset+daysInMonth;
  const remaining=(7-totalCells%7)%7;
  for(let d=1;d<=remaining;d++){
    const el=document.createElement('div');
    el.className='mc-day mc-other'; el.textContent=String(d);
    grid.appendChild(el);
  }
}

function calPrev(){
  calMonth--;
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function calNext(){
  calMonth++;
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}

function renderDateBar(){
  const k=dateKey(selDate);
  const evs=filteredForDate(k);
  document.getElementById('dateLabelText').textContent=formatDisplayDate(selDate);
  const cnt=evs.length;
  const pill=document.getElementById('datePill');
  pill.textContent=cnt===0?'нет мероприятий':`${cnt} ${cnt===1?'мероприятие':cnt<5?'мероприятия':'мероприятий'}`;
}

/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
function setTypeFilter(type){
  filterType=type;
  document.querySelectorAll('[data-type]').forEach(b=>{
    b.classList.toggle('active',b.dataset.type===type);
  });
  renderFeed(); renderDateBar();
}
function setFmtFilter(fmt){
  if(filterFmt===fmt){ filterFmt=''; }
  else { filterFmt=fmt; }
  document.getElementById('ftab-online').classList.toggle('active',filterFmt==='online');
  document.getElementById('ftab-offline').classList.toggle('active',filterFmt==='offline');
  renderFeed(); renderDateBar();
}

function filteredForDate(key){
  let evs=eventsByDate[key]||[];
  if(filterType) evs=evs.filter(e=>e.type===filterType);
  if(filterFmt)  evs=evs.filter(e=>e.format===filterFmt||(filterFmt==='online'&&e.format==='hybrid'));
  if(searchQ){const ql=searchQ.toLowerCase();evs=evs.filter(e=>(e.title||'').toLowerCase().includes(ql)||(e.description||'').toLowerCase().includes(ql));}
  return evs.sort((a,b)=>(a.time_start||'').localeCompare(b.time_start||''));
}

/* ══════════════════════════════════════════════════
   EVENT CARD
══════════════════════════════════════════════════ */
function buildCard(ev,i){
  const delay=(i*0.06).toFixed(2);
  const color=avc(ev.organizer_name||ev.title||'');
  const g=grad(ev.title||'');
  const eid=escA(String(ev.id));

  // format badge
  const isOnline=ev.format==='online'||ev.format==='hybrid';
  const fmtBadge=isOnline
    ? `<div class="ev-fmt-bdg bdg-online"><span class="bdg-online-dot"></span>${ev.format==='hybrid'?'Гибрид':'Онлайн'}</div>`
    : `<div class="ev-fmt-bdg bdg-offline"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Офлайн</div>`;

  // time chip
  const timeStr=ev.time_start?`${ev.time_start}${ev.time_end?' — '+ev.time_end:''} МСК`:'';

  // pills
  const pills=[];
  if(ev.time_start) pills.push(`<div class="pill p-time"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>${timeStr}</div>`);
  if(ev.duration_min){const h=Math.floor(ev.duration_min/60),m=ev.duration_min%60;pills.push(`<div class="pill p-dur">${h?h+' ч':''}${m?' '+m+' мин':''}</div>`);}
  if(!ev.fee||ev.fee===0) pills.push(`<div class="pill p-free"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Бесплатно</div>`);
  else pills.push(`<div class="pill p-fee"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>${fmtMoney(ev.fee)}</div>`);
  if(ev.city&&!isOnline) pills.push(`<div class="pill p-city"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(ev.city)}</div>`);
  if(ev.seats_total){
    const free=ev.seats_total-(ev.registered_count||0);
    if(free<=0) pills.push(`<div class="pill p-full">Мест нет</div>`);
    else pills.push(`<div class="pill p-seats"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${num(ev.seats_total)} мест · ${num(free)} своб.</div>`);
  } else if(ev.registered_count){
    pills.push(`<div class="pill p-seats"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${num(ev.registered_count)} записалось</div>`);
  }

  const tags=(ev.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const isFull=ev.seats_total>0&&(ev.registered_count||0)>=ev.seats_total;
  const regBtnCls=ev.is_registered?'btn-reg registered':(isFull?'btn-reg full':'btn-reg');
  const regBtnTxt=ev.is_registered?'✓ Записан':(isFull?'Мест нет':'Записаться');

  const coverImg=ev.cover?`<div class="ev-cover-img" style="background-image:url('${escA(ev.cover)}')"></div>`:'';

  return`<div class="ev-card" style="animation-delay:${delay}s" onclick="openDetail('${eid}')">
    <div class="ev-cover ${g}">
      ${coverImg}
      <div class="ev-cover-ovr"></div>
      ${fmtBadge}
      ${timeStr?`<div class="ev-time-chip"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>${esc(timeStr)}</div>`:''}
    </div>
    <div class="ev-body">
      <div class="ev-cat">${esc(TYPE_LABELS[ev.type]||ev.type||'')}${ev.category?' · '+esc(ev.category):''}</div>
      <div class="ev-title">${esc(ev.title||'Мероприятие')}</div>
      <div class="ev-org">
        <div class="ev-org-av" style="background:${color}">${letter(ev.organizer_name||'?')}</div>
        ${esc(ev.organizer_name||'')}${ev.speaker_name?' · '+esc(ev.speaker_name):''}
      </div>
      <div class="ev-meta">${pills.join('')}</div>
      ${ev.description?`<div class="ev-desc">${esc(ev.description)}</div>`:''}
      ${tags?`<div class="ev-tags">${tags}</div>`:''}
      <div class="ev-foot">
        <div class="ev-stat"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${num(ev.views_count||0)}</div>
        <div class="ev-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${num(ev.comments_count||0)}</div>
        <div class="ev-btns">
          <button class="btn-more" onclick="event.stopPropagation();openDetail('${eid}')">Подробнее</button>
          <button class="${regBtnCls}" id="reg-${eid}" onclick="event.stopPropagation();regEvent('${eid}',this)">${regBtnTxt}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function fmtMoney(n){if(!n)return'Бесплатно';if(n>=1000)return Math.round(n/1000)+'к ₽';return n+' ₽';}

  const g=grad(ev.title||'');
  const isOnline=ev.format==='online'||ev.format==='hybrid';
  const isFull=ev.seats_total>0&&(ev.registered_count||0)>=ev.seats_total;

  const dateStr=dateObj?`${dateObj.getDate()} ${MONTHS_GEN[dateObj.getMonth()]} ${dateObj.getFullYear()}`:'';

  else pills.push(`<div class="pill p-fee"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/></svg>${fmtMoney(ev.fee)}</div>`);
  if(ev.city&&!isOnline) pills.push(`<div class="pill p-city"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(ev.city)}</div>`);
  pills.push(`<div class="pill ${isOnline?'p-time':'p-city'}">${isOnline?'Онлайн':'Офлайн'}</div>`);

  const speakers=Array.isArray(ev.speakers)?ev.speakers:[];
  const spHtml=speakers.length?speakers.map(s=>`

  document.getElementById('dpBody').innerHTML=`

      ${coverImg}

        <div class="dp-hero-badge">${isOnline?'● Онлайн':'📍 Офлайн'}</div>
        <div class="dp-hero-title">${esc(ev.title||'Мероприятие')}</div>
        ${ev.category?`<div class="dp-hero-cat">${esc(TYPE_LABELS[ev.type]||'')} · ${esc(ev.category)}</div>`:''}
      </div>
    </div>
    <div class="dp-body">
      <div class="dp-section">Организатор</div>
      <div class="dp-org-row">
        <div class="dp-org-av" style="background:${color}">${letter(ev.organizer_name||'?')}</div>
        <div>
          <div class="dp-org-name">${esc(ev.organizer_name||'')}</div>
          <div class="dp-org-role">Организатор мероприятия</div>
        </div>
      </div>

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('open');

}

══════════════════════════════════════════════════ */
async function regEvent(id, btn){
  if(btn.classList.contains('registered')||btn.classList.contains('full')) return;
  try{ await fetch(`${API}/events/${id}/register`,{method:'POST',headers:{Authorization:'Bearer '+tk()}}); }catch{}
  btn.textContent='✓ Записан'; btn.className='btn-reg registered';
  const ev=eventStore.get(String(id));
  if(ev){ev.is_registered=true;(ev.registered_count=(ev.registered_count||0)+1);}
  renderCalendar();
}
async function regEventDetail(id, btn){
  if(btn.classList.contains('registered')||btn.classList.contains('full')) return;
  try{ await fetch(`${API}/events/${id}/register`,{method:'POST',headers:{Authorization:'Bearer '+tk()}}); }catch{}
  btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>Вы записаны';
  btn.className='dp-btn-pri registered';
  const ev=eventStore.get(String(id));
  if(ev){ev.is_registered=true;(ev.registered_count=(ev.registered_count||0)+1);}
  const feedBtn=document.getElementById(`reg-${id}`);
  if(feedBtn){feedBtn.textContent='✓ Записан';feedBtn.className='btn-reg registered';}
  renderCalendar();
}

function renderStats(s){
  document.getElementById('statsList').innerHTML=`
    <div class="stat-row"><span class="stat-lbl">Всего мероприятий</span><span class="stat-val">${num(s.total||0)}</span></div>
    <div class="stat-row"><span class="stat-lbl">Сегодня</span><span class="stat-val" style="color:var(--g)">${num(s.today||0)}</span></div>
    <div class="stat-row"><span class="stat-lbl">Предстоящих</span><span class="stat-val">${num(s.upcoming||0)}</span></div>`;
}
function renderCats(cats){
  document.getElementById('catList').innerHTML=cats.map(c=>`
    <div class="cat-item" onclick="setTypeFilter('${escA(c.type||'')}')">
      <span class="cat-name"><span class="cat-dot" style="background:${CAT_COLORS[c.type]||'var(--gmt)'}"></span>${esc(c.label||c.name||c.type)}</span>
      <span class="cat-cnt">${num(c.count||0)}</span>
    </div>`).join('');
}
function renderMy(list){
  const el=document.getElementById('myList');
  if(!list.length){
    el.innerHTML=`<div class="empty-block"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><p>Вы ещё ни на что не записались</p></div>`;
    return;
  }
  el.innerHTML=list.map(ev=>{
    const d=parseDate(ev.date);
    const isToday=d&&isSameDay(d,today);
    const dotCls=isToday?'dot-today':'dot-soon';
    const sub=d?`${d.getDate()} ${MONTHS_GEN[d.getMonth()]}${ev.time_start?' · '+ev.time_start:''}`:ev.time_start||'';
    return`<div class="my-item" onclick="selectDate(new Date('${escA(ev.date||'')}'))">
      <div class="my-logo" style="background:${avc(ev.title||'')}">${letter(ev.title||'?')}</div>
      <div style="flex:1;min-width:0"><div class="my-name">${esc(ev.title||'')}</div><div class="my-sub">${sub}</div></div>
      <div class="my-dot ${dotCls}"></div>
    </div>`;
  }).join('');
}
function renderPopular(){
  const all=[];
  Object.values(eventsByDate).forEach(evs=>all.push(...evs));
  const sorted=all.slice().sort((a,b)=>(b.registered_count||0)-(a.registered_count||0)).slice(0,5);
  const el=document.getElementById('popList');
  if(!sorted.length){el.innerHTML=`<div class="empty-block"><p>Нет данных</p></div>`;return;}
  el.innerHTML=sorted.map((ev,i)=>{
    const d=parseDate(ev.date);
    const dateStr=d?`${d.getDate()} ${MONTHS_GEN[d.getMonth()]}`:'';
    return`<div class="pop-item" onclick="selectDate(new Date('${escA(ev.date||'')}'))">
      <div class="pop-num">${i+1}</div>
      <div><div class="pop-ttl">${esc(ev.title||'')}</div><div class="pop-sub">${num(ev.registered_count||0)} записей${dateStr?' · '+dateStr:''}</div></div>
    </div>`;
  }).join('');
}

let speakersState=[], coverStateEv='';
function setupCreateForm(){
  document.getElementById('coverInput').addEventListener('change',e=>{
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{coverStateEv=ev.target.result;renderCoverSlot();};
    r.readAsDataURL(f); e.target.value='';
  });
  renderSpeakers();
  renderCoverSlot();
}
function renderCoverSlot(){
  const host=document.getElementById('coverUpload');
  if(coverStateEv){
    host.innerHTML=`<img src="${escA(coverStateEv)}" alt=""><button type="button" class="rm-cover" onclick="event.stopPropagation();coverStateEv='';renderCoverSlot()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    host.style.borderStyle='solid';
  } else {
    host.innerHTML=`<div class="cu-hint"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Нажмите, чтобы загрузить</div>`;
    host.style.borderStyle='dashed';
  }
}
function renderSpeakers(){
  document.getElementById('speakersList').innerHTML=speakersState.map((s,i)=>`
    <div style="display:grid;grid-template-columns:1fr 1fr 34px;gap:8px;margin-bottom:8px">
      <input class="form-input" placeholder="Имя спикера" value="${escA(s.name)}" oninput="speakersState[${i}].name=this.value" style="padding:8px 10px;font-size:12px">
      <input class="form-input" placeholder="Должность / компания" value="${escA(s.role)}" oninput="speakersState[${i}].role=this.value" style="padding:8px 10px;font-size:12px">
      <button type="button" style="width:34px;height:34px;border-radius:var(--rm);border:1.5px solid var(--bdr);background:var(--w);cursor:pointer;display:grid;place-items:center;flex-shrink:0;color:var(--gmt)" onclick="speakersState.splice(${i},1);renderSpeakers()"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`).join('');
}
function addSpeaker(){ speakersState.push({name:'',role:''});renderSpeakers(); }

function openCreateModal(){
  document.getElementById('evTitle').value='';

  document.getElementById('evFormat').value='online';
  document.getElementById('evCategory').value='';
  document.getElementById('evCity').value='';

  document.getElementById('evSeats').value='0';

async function submitEvent(){
  const title=document.getElementById('evTitle').value.trim();
  const date=document.getElementById('evDate').value;
  const desc=document.getElementById('evDesc').value.trim();
  if(!title){alert('Укажите название');return;}
  if(!date){alert('Укажите дату');return;}
  const btn=document.getElementById('evSubmitBtn');
  btn.disabled=true; btn.textContent='Публикация…';
  const body={
    title, date,
    type:document.getElementById('evType').value,
    format:document.getElementById('evFormat').value,
    category:document.getElementById('evCategory').value,
    city:document.getElementById('evCity').value.trim(),
    time_start:document.getElementById('evTimeStart').value,
    time_end:document.getElementById('evTimeEnd').value,
    fee:parseInt(document.getElementById('evFee').value)||0,
    seats_total:parseInt(document.getElementById('evSeats').value)||0,
    description:desc,
    tags:document.getElementById('evTags').value.split(',').map(s=>s.trim()).filter(Boolean),
    speakers:speakersState.filter(s=>s.name.trim()),
    cover:coverStateEv,
  };
  try{
    const r=await fetch(`${API}/events`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+tk()},body:JSON.stringify(body)});
    if(r.ok){ closeCreateModal(); loadAllEvents(); loadStats(); }
    else throw 0;
  }catch{ closeCreateModal(); loadAllEvents(); }
  btn.disabled=false; btn.textContent='Опубликовать';
}
