<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LASTOP | Профиль</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-gray-50">
    <header class="bg-white border-b">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/dashboard.html" class="font-bold text-lg">LASTOP</a>
            <nav class="flex items-center gap-4 text-sm flex-wrap justify-end">
                <a href="/dashboard.html" class="text-gray-600 hover:text-black">Главная</a>
                <a href="/dashboard.html#communities" class="text-gray-600 hover:text-black">Сообщества</a>
                <a href="/company.html" class="text-gray-600 hover:text-black">Компании</a>
                <a href="/jobs.html" class="text-gray-600 hover:text-black">Резюме и вакансии</a>
                <a href="/forum.html" class="text-gray-600 hover:text-black">Форум</a>
                <a href="/chat.html" class="text-gray-600 hover:text-black">Чат</a>
                <a href="/settings.html" class="text-gray-600 hover:text-black">Настройки</a>
            </nav>
        </div>
    </header>
    <div class="max-w-2xl mx-auto p-8">
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h1 class="text-2xl font-bold mb-6">Мой профиль</h1>
            <div id="profileInfo" class="space-y-4"><div class="text-center py-8">Загрузка...</div></div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token || !user?.email) window.location.href = '/login.html';

        document.getElementById('profileInfo').innerHTML = `<div class="flex items-center space-x-4"><div class="w-20 h-20 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white text-2xl font-bold">${user.full_name?.charAt(0) || 'U'}</div><div><h2 class="text-xl font-semibold">${user.full_name || 'Пользователь'}</h2><p class="text-gray-500">${user.email || ''}</p>${user.company_name ? `<p class="text-gray-500">${user.company_name}</p>` : ''}</div></div><div class="border-t pt-4"><button onclick="window.location.href='/settings.html'" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Редактировать профиль</button></div>`;
    </script>
</body>
</html>
