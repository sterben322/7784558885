<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>LASTOP | Профиль</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50"><div class="max-w-2xl mx-auto p-8"><div class="bg-white rounded-xl shadow-sm p-6"><h1 class="text-2xl font-bold mb-6">Мой профиль</h1><div id="profileInfo" class="space-y-4"><div class="text-center py-8">Загрузка...</div></div></div></div>
<script>const user=JSON.parse(localStorage.getItem('user')||'{}');document.getElementById('profileInfo').innerHTML=`<div class="flex items-center space-x-4"><div class="w-20 h-20 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white text-2xl font-bold">${user.full_name?.charAt(0)||'U'}</div><div><h2 class="text-xl font-semibold">${user.full_name}</h2><p class="text-gray-500">${user.email}</p>${user.company_name?`<p class="text-gray-500">${user.company_name}</p>`:''}</div></div><div class="border-t pt-4"><button onclick="window.location.href='/settings.html'" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Редактировать профиль</button></div>`;</script></body></html>
