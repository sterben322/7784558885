<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Мой профиль</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
    <script src="/assets/theme.js" defer></script>
</head>
<body class="bg-white text-[#273244]">
<div class="min-h-screen p-4 md:p-6">
    <div class="mx-auto w-full max-w-[1460px] rounded-[30px] border border-white/70 bg-white shadow-[0_18px_60px_rgba(162,175,186,0.24)] overflow-hidden">
        <div class="grid gap-5 p-4 md:grid-cols-[minmax(0,1fr)_320px] md:p-6">
            <main class="space-y-4">
                <section class="rounded-[24px] border border-[#e7ecef] bg-white shadow-[0_10px_22px_rgba(178,190,198,0.10)]">
                    <div class="h-[220px] rounded-t-[24px] bg-[radial-gradient(circle_at_top_right,rgba(255,255,255,0.18),transparent_40%),linear-gradient(110deg,#1f6a4d_0%,#2b8662_48%,#41936f_100%)]"></div>
                    <div class="relative px-5 pb-5 pt-0 md:px-7 md:pb-6">
                        <div class="-mt-12 flex flex-wrap items-end justify-between gap-4">
                            <div class="flex items-end gap-4">
                                <div id="mainAvatar" class="avatar-circle grid h-24 w-24 place-items-center border-4 border-white bg-[#3f8566] text-4xl font-bold text-white shadow">U</div>
                                <div class="pb-2">
                                    <h1 id="profileName" class="text-3xl font-semibold text-[#273244]">Пользователь</h1>
                                    <p id="profileRole" class="text-[16px] text-[#607080]"></p>
                                    <p id="profileLocation" class="text-sm text-[#8793a0]"><i class="fa-solid fa-location-dot mr-1"></i>Москва, Россия</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <a id="registerButton" href="/register.html" class="hidden rounded-xl bg-[#2b8662] px-4 py-2 text-sm font-semibold text-white shadow hover:bg-[#246f52]">
                                    Зарегистрироваться
                                </a>
                                <span id="verifiedBadge" class="rounded-full bg-[#e8f5ee] px-3 py-1 text-sm font-semibold text-[#4e8d75]"><i class="fa-solid fa-check mr-1"></i>Верифицирован</span>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="aboutSection" class="rounded-[20px] border border-[#e7ecef] bg-white px-5 py-5 shadow-[0_8px_16px_rgba(178,190,198,0.08)]">
                    <h2 class="text-[22px] font-semibold text-[#2f3d4f]">О себе</h2>
                    <p id="aboutText" class="mt-3 text-[16px] leading-7 text-[#667585]"></p>
                </section>

                <section id="friends" class="rounded-[20px] border border-[#e7ecef] bg-white px-5 py-5 shadow-[0_8px_16px_rgba(178,190,198,0.08)]">
                    <h2 class="text-[22px] font-semibold text-[#2f3d4f]">Друзья</h2>
                    <p class="mt-2 text-[#708090]">Демонстрационный раздел друзей с переходом в их профили.</p>
                    <div id="friendsList" class="mt-4 grid gap-3 md:grid-cols-3"></div>
                </section>
            </main>

            <aside class="space-y-4">
                <section id="statsSection" class="rounded-[20px] border border-[#e7ecef] bg-white p-5 shadow-[0_8px_16px_rgba(178,190,198,0.08)]">
                    <div class="text-sm text-[#7f8d9b]">Просмотры профиля за 7 дней</div>
                    <div class="mt-2 text-5xl font-semibold text-[#2f3d4f]">247</div>
                    <div class="mt-1 text-sm font-semibold text-[#3e8c6f]">+18% к прошлой неделе</div>
                </section>
            </aside>
        </div>
    </div>
</div>

<script>
const DEMO_USERS = {
    ivan: {
        full_name: 'Иван Петров',
        company: 'Логистик Про',
        role: 'CEO',
        about: 'Управляю цепочками поставок и развиваю экспортные маршруты для промышленного сектора.'
    },
    maria: {
        full_name: 'Мария Козлова',
        company: 'ТекстильПро',
        role: 'Руководитель экспортного отдела',
        about: 'Специализируюсь на международных продажах, контрактном производстве и выставочной деятельности.'
    },
    artem: {
        full_name: 'Артём Смирнов',
        company: 'BuildNova',
        role: 'Операционный директор',
        about: 'Координирую развитие строительных проектов и цифровизацию закупок в региональных филиалах.'
    }
};

function renderProfile(user) {
    const fullName = user.full_name || 'Пользователь';
    const avatar = document.getElementById('mainAvatar');
    if (user.avatar_url) {
        avatar.innerHTML = `<img src="${user.avatar_url}" alt="Аватар пользователя" class="h-full w-full rounded-full object-cover">`;
    } else {
        avatar.textContent = (fullName[0] || 'U').toUpperCase();
    }
    document.getElementById('profileName').textContent = fullName;
    document.getElementById('profileRole').textContent = `${user.role || 'Участник сообщества'} · ${user.company || 'LASTOP'}`;
    document.getElementById('aboutText').textContent = user.about || `Публичный профиль ${fullName}.`;
}

function toggleGuestView(isAuthenticated) {
    const registerButton = document.getElementById('registerButton');
    const verifiedBadge = document.getElementById('verifiedBadge');
    const aboutSection = document.getElementById('aboutSection');
    const friendsSection = document.getElementById('friends');
    const statsSection = document.getElementById('statsSection');

    registerButton.classList.toggle('hidden', isAuthenticated);
    verifiedBadge.classList.toggle('hidden', !isAuthenticated);
    aboutSection.classList.toggle('hidden', !isAuthenticated);
    friendsSection.classList.toggle('hidden', !isAuthenticated);
    statsSection.classList.toggle('hidden', !isAuthenticated);
}

function renderFriends() {
  const friends = [
    { id: 'ivan', label: 'ИП' },
    { id: 'maria', label: 'МК' },
    { id: 'artem', label: 'АС' }
  ];

  const wrap = document.getElementById('friendsList');
  wrap.innerHTML = friends.map(({ id, label }) => {
    const u = DEMO_USERS[id];
    return `<div class="rounded-2xl border border-[#e6ecef] p-4"><div class="flex items-center gap-3"><div class="grid h-10 w-10 place-items-center avatar-circle bg-[#5fa786] text-sm font-semibold text-white">${label}</div><div><div class="font-semibold">${u.full_name}</div><div class="text-xs text-[#8090a0]">${u.role} · ${u.company}</div></div></div><a href="/profile.html?demo=${id}" class="mt-3 inline-flex rounded-xl border border-[#d8e2e7] px-3 py-1.5 text-sm text-[#4f5e6d] hover:bg-[#f5f8f9]">Открыть профиль</a></div>`;
  }).join('');
}

async function loadCurrentUser() {
    const token = localStorage.getItem('token');
    if (!token) return null;

    try {
        const response = await fetch('/api/me', {
            headers: { Authorization: `Bearer ${token}` }
        });
        if (!response.ok) return null;
        const data = await response.json();
        return data.user || null;
    } catch (e) {
        return null;
    }
}

async function initProfile() {
    const params = new URLSearchParams(window.location.search);
    const demoId = params.get('demo');

    if (demoId && DEMO_USERS[demoId]) {
        toggleGuestView(true);
        renderProfile(DEMO_USERS[demoId]);
        renderFriends();
        return;
    }

    const apiUser = await loadCurrentUser();
    const localUser = JSON.parse(localStorage.getItem('user') || '{}');
    const source = apiUser || localUser;
    const isAuthenticated = Boolean(apiUser || localStorage.getItem('token'));

    toggleGuestView(isAuthenticated);
    renderProfile({
        full_name: source.full_name || [source.first_name, source.last_name].filter(Boolean).join(' '),
        company: source.company_name,
        role: source.position,
        avatar_url: source.avatar_url
    });
    renderFriends();
}

initProfile();
</script>
</body>
</html>
