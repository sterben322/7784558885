<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>LASTOP | Форум</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50"><div class="max-w-4xl mx-auto p-8"><div class="bg-white rounded-xl shadow-sm p-6"><h1 class="text-2xl font-bold mb-6">Форум</h1><div class="space-y-4" id="topicsList"><div class="text-center py-8 text-gray-500">Загрузка...</div></div></div></div>
<script>const API_URL='/api';async function loadTopics(){try{const response=await fetch(`${API_URL}/topics`,{headers:{'Authorization':`Bearer ${localStorage.getItem('token')}`}});const data=await response.json();document.getElementById('topicsList').innerHTML=data.topics.map(t=>`<div class="border rounded-lg p-4"><h3 class="font-semibold text-lg">${t.title}</h3><p class="text-sm text-gray-500">${t.author_name} • ${t.replies_count} ответов • ${new Date(t.created_at).toLocaleDateString()}</p><p class="text-gray-600 mt-2">${t.content.substring(0,150)}...</p></div>`).join('');}catch(e){document.getElementById('topicsList').innerHTML='<div class="text-center py-8 text-red-500">Ошибка загрузки</div>';}}loadTopics();</script></body></html>
