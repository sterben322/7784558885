<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTOP | Компания</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-4">
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 h-32"></div>
            <div class="px-6 pb-6">
                <div class="flex items-end justify-between">
                    <div class="flex items-end space-x-4">
                        <div class="w-28 h-28 bg-white rounded-2xl flex items-center justify-center shadow-lg -mt-14" id="companyLogo"><i class="fas fa-building text-5xl text-blue-600"></i></div>
                        <div class="mb-2"><h1 class="text-2xl font-bold" id="companyName">Загрузка...</h1><div class="flex items-center space-x-2 mt-1"><span id="companyStats" class="text-sm text-gray-500"></span></div></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm mt-6 p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="col-span-2">
                    <h3 class="font-semibold text-lg mb-3">О компании</h3>
                    <p class="text-gray-600" id="companyDescription"></p>
                    <h3 class="font-semibold text-lg mt-6 mb-3">Контакты</h3>
                    <div class="space-y-2"><p id="companyPhone" class="text-gray-600"><i class="fas fa-phone mr-2"></i></p><p id="companyEmail" class="text-gray-600"><i class="fas fa-envelope mr-2"></i></p><p id="companyWebsite" class="text-gray-600"><i class="fas fa-globe mr-2"></i></p><p id="companyAddress" class="text-gray-600"><i class="fas fa-map-marker-alt mr-2"></i></p></div>
                </div>
                <div class="bg-gray-50 rounded-xl p-4">
                    <h3 class="font-semibold mb-3">Статистика</h3>
                    <div class="space-y-3"><div><p class="text-sm text-gray-500">Сотрудников</p><p class="text-2xl font-bold" id="employeeCount">0</p></div><div><p class="text-sm text-gray-500">Подписчиков</p><p class="text-2xl font-bold" id="followersCount">0</p></div><div><p class="text-sm text-gray-500">ИНН</p><p class="font-medium" id="companyInn">—</p></div></div>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm mt-6 p-6">
            <h3 class="font-semibold text-lg mb-4">Сотрудники</h3>
            <div id="employeesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </div>
    
    <div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg hidden transition-all z-50 bg-gray-800 text-white"></div>

    <script>
        const API_URL = '/api';
        let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let currentCompany = null;
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('hidden');
            const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg transition-all z-50 ${colors[type]}`;
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
        
        async function loadCompany() {
            try {
                const response = await fetch(`${API_URL}/company`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                const company = data.company;
                currentCompany = company;
                
                if (!company) {
                    document.body.innerHTML = '<div class="text-center py-12"><p class="text-gray-500">Компания не найдена</p><a href="/create-company.html" class="text-blue-600">Создать компанию</a></div>';
                    return;
                }
                
                document.getElementById('companyName').textContent = company.name;
                document.getElementById('companyDescription').textContent = company.description || 'Описание не добавлено';
                document.getElementById('employeeCount').textContent = company.employee_count || 0;
                document.getElementById('followersCount').textContent = company.followers_count || 0;
                document.getElementById('companyInn').textContent = company.inn || '—';
                document.getElementById('companyPhone').innerHTML = `<i class="fas fa-phone mr-2"></i>${company.phone || 'Не указан'}`;
                document.getElementById('companyEmail').innerHTML = `<i class="fas fa-envelope mr-2"></i>${currentUser.email || 'Не указан'}`;
                document.getElementById('companyWebsite').innerHTML = `<i class="fas fa-globe mr-2"></i>${company.website || 'Не указан'}`;
                document.getElementById('companyAddress').innerHTML = `<i class="fas fa-map-marker-alt mr-2"></i>${company.address || 'Не указан'}`;
                
                if (company.logo_url) {
                    document.getElementById('companyLogo').innerHTML = `<img src="${company.logo_url}" class="w-full h-full rounded-2xl object-cover">`;
                }
                
                await loadEmployees();
            } catch (error) {
                console.error('Failed to load company:', error);
                showToast('Ошибка загрузки', 'error');
            }
        }
        
        async function loadEmployees() {
            try {
                if (!currentCompany) return;
                const response = await fetch(`${API_URL}/companies/${currentCompany.id}/employees`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                const container = document.getElementById('employeesContainer');
                if (!data.employees || data.employees.length === 0) {
                    container.innerHTML = '<div class="col-span-3 text-center py-8 text-gray-500">Нет сотрудников</div>';
                    return;
                }
                container.innerHTML = data.employees.map(emp => `
                    <div class="flex items-center space-x-3 p-3 border rounded-lg">
                        <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white font-bold">${emp.user_name?.charAt(0) || 'U'}</div>
                        <div><p class="font-semibold">${emp.user_name}</p><p class="text-sm text-gray-600">${emp.position_name}</p>${emp.department ? `<p class="text-xs text-gray-400">${emp.department}</p>` : ''}</div>
                    </div>
                `).join('');
            } catch (error) { console.error(error); }
        }
        
        loadCompany();
    </script>
</body>
</html>
